<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC 2026 - Knockout Bracket</title>

  <!-- R32 only -->
  <link rel="stylesheet" href="../WC_common/R32_styles.css">
</head>

<body>
  <div id="topbar"></div>

  <div class="page-wrap">
    <div class="bracket-wrap">
      <div id="lastUpdatedText" class="bracket-last-updated">Last Updated: —</div>

      <!-- Floating PC nav buttons -->
      <button
        id="bracketLeftBtn"
        class="bracket-nav-btn bracket-nav-btn-left is-hidden"
        onclick="scrollBracket(-1)"
        aria-label="Scroll bracket left"
        title="Previous rounds"
      >‹</button>

      <button
        id="bracketRightBtn"
        class="bracket-nav-btn bracket-nav-btn-right"
        onclick="scrollBracket(1)"
        aria-label="Scroll bracket right"
        title="Next rounds"
      >›</button>

      <div id="bracketStage" class="bracket-stage">
        <div id="bracketApp"></div>
      </div>
    </div>
  </div>

  <script>
    window.global = window;
    window.process = window.process || { env: {} };
  </script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <!-- R32 only -->
  <script src="../WC_common/matches.js"></script>
  <script src="../WC_common/teams.js"></script>
  <script src="../WC_common/R32_fetchScores.js"></script>
  <script src="../WC_common/R32_utils.js"></script>
  <script src="../WC_common/R32_matchCards.js"></script>

  <script>
    const R32_GAME_ID = "WC2026_DEV";
    const SESSION_KEY = "session_" + R32_GAME_ID;
    const userId = localStorage.getItem(SESSION_KEY);
    if (!userId) window.location.href = "index.html";

    const R32_REFRESH_MS = 10 * 60 * 1000;
    const R32_IDLE_MS = 20 * 60 * 1000;
    const KNOCKOUT_SYNC_URL = "";

    // 280 lane + 30 gap
    const BRACKET_STEP_PX = 310;

    let refreshRuntime = null;
    let idleRuntime = null;
    let currentBracketWindow = 0;
    let scrollSyncTimer = null;

    function getDbInstance() {
      try {
        if (window.firebase && firebase.apps && firebase.apps.length) {
          return firebase.firestore();
        }
      } catch (err) {
        console.error("Failed to create Firestore instance:", err);
      }
      return null;
    }

    function getBracketScrollEl() {
      return document.querySelector("#bracketApp .bracket-scroll");
    }

    function clampBracketWindow(value) {
      return Math.max(0, Math.min(2, value));
    }

    function applyBracketWindowClass() {
      document.body.classList.remove("bracket-window-0", "bracket-window-1", "bracket-window-2");
      document.body.classList.add("bracket-window-" + currentBracketWindow);
    }

    function setBracketWindow(index) {
      currentBracketWindow = clampBracketWindow(index);
      applyBracketWindowClass();
    }

    function syncBracketWindowFromScroll() {
      const scrollEl = getBracketScrollEl();
      if (!scrollEl) return;

      const computedIndex = Math.round(scrollEl.scrollLeft / BRACKET_STEP_PX);
      setBracketWindow(computedIndex);
    }

    function updateBracketNavButtons() {
      const scrollEl = getBracketScrollEl();
      const leftBtn = document.getElementById("bracketLeftBtn");
      const rightBtn = document.getElementById("bracketRightBtn");

      if (!leftBtn || !rightBtn) return;

      if (!scrollEl) {
        leftBtn.classList.add("is-hidden");
        rightBtn.classList.add("is-hidden");
        return;
      }

      const maxScroll = scrollEl.scrollWidth - scrollEl.clientWidth;
      const scrollLeft = scrollEl.scrollLeft;

      if (maxScroll <= 2) {
        leftBtn.classList.add("is-hidden");
        rightBtn.classList.add("is-hidden");
        return;
      }

      if (scrollLeft <= 2) {
        leftBtn.classList.add("is-hidden");
      } else {
        leftBtn.classList.remove("is-hidden");
      }

      if (scrollLeft >= maxScroll - 2) {
        rightBtn.classList.add("is-hidden");
      } else {
        rightBtn.classList.remove("is-hidden");
      }
    }

    function attachBracketScrollListener() {
      const scrollEl = getBracketScrollEl();
      if (!scrollEl) return;

      scrollEl.addEventListener("scroll", function () {
        updateBracketNavButtons();

        if (scrollSyncTimer) {
          clearTimeout(scrollSyncTimer);
        }

        scrollSyncTimer = setTimeout(function () {
          syncBracketWindowFromScroll();
        }, 120);
      }, { passive: true });
    }

    function scrollBracket(direction) {
      const scrollEl = getBracketScrollEl();
      if (!scrollEl) return;

      const nextWindow = clampBracketWindow(currentBracketWindow + direction);
      setBracketWindow(nextWindow);

      scrollEl.scrollTo({
        left: nextWindow * BRACKET_STEP_PX,
        behavior: "smooth"
      });

      setTimeout(updateBracketNavButtons, 350);
    }

    function goToLanding() {
      window.location.href = "landing.html";
    }

    function logout() {
      localStorage.removeItem(SESSION_KEY);
      window.location.href = "index.html";
    }

    function buildTopbar() {
      if (
        window.R32Utils &&
        typeof R32Utils.renderTopbar === "function" &&
        typeof R32Utils.makeButtonHtml === "function"
      ) {
        const actionsHtml = [
          R32Utils.makeButtonHtml({ label: "Leaderboard", onClick: "goToLanding()" }),
          R32Utils.makeButtonHtml({ label: "Logout", onClick: "logout()" })
        ].join("");

        R32Utils.renderTopbar({
          title: "Knockout Bracket",
          actionsHtml
        });
        return;
      }

      const topbar = document.getElementById("topbar");
      if (!topbar) return;

      topbar.innerHTML = `
        <div class="r32-topbar-inner">
          <div class="r32-topbar-title">Knockout Bracket</div>
          <div class="r32-topbar-actions">
            <button class="r32-btn" onclick="goToLanding()">Leaderboard</button>
            <button class="r32-btn" onclick="logout()">Logout</button>
          </div>
        </div>
      `;
    }

    function renderEmptyState(message) {
      const app = document.getElementById("bracketApp");
      if (!app) return;
      app.innerHTML = `<div class="empty-state">${message}</div>`;
      updateBracketNavButtons();
    }

    function renderBracket(context) {
      const app = document.getElementById("bracketApp");
      const lastUpdatedText = document.getElementById("lastUpdatedText");

      if (!app) return;

      const mergedMatches = context && context.mergedMatches ? context.mergedMatches : [];
      const snapshot = context && context.snapshot ? context.snapshot : null;

      if (!mergedMatches.length) {
        renderEmptyState("No knockout schedule found.");
        if (lastUpdatedText) lastUpdatedText.textContent = "Last Updated: —";
        return;
      }

      const boardSpec = [
        {
          title: "Round of 32",
          laneClass: "lane-r32",
          matchNumbers: [74, 77, 73, 75, 83, 84, 81, 82, 76, 78, 79, 80, 86, 88, 85, 87]
        },
        {
          title: "Round of 16",
          laneClass: "lane-r16",
          matchNumbers: [89, 90, 93, 94, 91, 92, 95, 96]
        },
        {
          title: "Quarter-finals",
          laneClass: "lane-qf",
          matchNumbers: [97, 98, 99, 100]
        },
        {
          title: "Semi-finals",
          laneClass: "lane-sf",
          matchNumbers: [101, 102]
        },
        {
          title: "Final",
          laneClass: "lane-final",
          matchNumbers: [104, 103]
        }
      ];

      app.innerHTML = R32MatchCards.buildBracketBoardHtml(boardSpec, mergedMatches);

      // Re-apply current window class after render
      applyBracketWindowClass();

      attachBracketScrollListener();

      requestAnimationFrame(function () {
        const scrollEl = getBracketScrollEl();
        if (scrollEl) {
          scrollEl.scrollLeft = currentBracketWindow * BRACKET_STEP_PX;
        }
        updateBracketNavButtons();
      });

      if (lastUpdatedText) {
        lastUpdatedText.textContent =
          `Last Updated: ${R32Utils.formatUpdatedAtEdt(snapshot && snapshot.updatedAtUtc)}`;
      }
    }

    function startPage() {
      buildTopbar();

      // Initial visible window = R32 / R16 / QF
      setBracketWindow(0);

      if (!window.R32matches || !Array.isArray(window.R32matches) || !window.R32matches.length) {
        renderEmptyState("matches.js loaded, but window.R32matches is missing or empty.");
        return;
      }

      if (!window.R32FetchScores) {
        renderEmptyState("R32_fetchScores.js failed to load.");
        return;
      }

      if (!window.R32Utils) {
        renderEmptyState("R32_utils.js failed to load.");
        return;
      }

      if (!window.R32MatchCards) {
        renderEmptyState("R32_matchCards.js failed to load.");
        return;
      }

      const dbInstance = getDbInstance();

      if (!dbInstance) {
        renderEmptyState("firebase.js loaded, but Firestore db is not available.");
        return;
      }

      idleRuntime = R32Utils.installIdleTimeout({
        sessionKey: SESSION_KEY,
        redirectUrl: "index.html",
        idleMs: R32_IDLE_MS,
        checkMs: 60 * 1000
      });

      window.addEventListener("resize", updateBracketNavButtons);

      refreshRuntime = R32Utils.startR32PageRefresh({
        db: dbInstance,
        syncUrl: KNOCKOUT_SYNC_URL,
        refreshMs: R32_REFRESH_MS,
        triggerSyncOnStart: false,
        triggerSyncOnRefresh: false,
        onUpdate: async function (context) {
          renderBracket(context);
        },
        onError: function (err) {
          console.error("R32 bracket refresh error:", err);
          renderEmptyState("Failed to load knockout bracket.");
        }
      });
    }

    startPage();
  </script>
</body>
</html>
``
