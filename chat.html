<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">	
  <title>WC 2026 - Chat</title>
  <link rel="stylesheet" href="../WC_common/styles.css">

  <style>
    .chat-box {
      width: 100%;
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
      height: 420px;
      overflow-y: auto;
    }

    .input-row {
      margin-top: 10px;
    }

    .input-line {
      display: flex;
      gap: 8px;
    }

    .input-line input {
      flex: 1;
      padding: 8px;
      font-size: 12px;
      border: 1px solid #bbb;
      border-radius: 4px;
    }

    .message {
      margin-bottom: 10px;
      max-width: 70%;
    }

    .left {
      text-align: left;
    }

    .right {
      margin-left: auto;
      text-align: right;
    }

    .name {
      color: #1a73e8;
      font-weight: bold;
    }

    .time {
      color: #777;
      font-size: 9pt;
      margin-left: 5px;
    }

    .text {
      margin-top: 2px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .new-message-bar {
      display: none;
      text-align: center;
      margin-top: 6px;
      color: #1a73e8;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="topbar"></div>

<div class="page-wrap">
  <div id="chatBox" class="chat-box"></div>

  <div class="input-row">
    <div class="input-line">
      <input id="msgInput" placeholder="Type message..." />
      <button onclick="sendMessage()">Send</button>
    </div>

    <div id="newMsgBar" class="new-message-bar">New message ↓</div>
  </div>
</div>

<script>
  window.global = window;
  window.process = window.process || { env: {} };
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<!-- shared -->
<script src="../WC_common/utils.js"></script>

<script>
const SESSION_KEY = "session_" + GAME_ID;
const userId = localStorage.getItem(SESSION_KEY);
if (!userId) window.location.href = "index.html";

renderTopbar(
  "Chat **Test",
  `
    <button onclick="goBack()">Return</button>
    <button onclick="logoutUser()">Logout</button>
  `
);

const box = document.getElementById("chatBox");
const newMsgBar = document.getElementById("newMsgBar");
const msgInput = document.getElementById("msgInput");

const PAGE_SIZE = 15;

let unsubscribe = null;
let isAtBottom = true;
let forceScrollToBottom = false;
let loadingOlderFlag = false;
let cutoffTimestamp = null;

let olderMessages = [];
let latestMessages = [];
let oldestLoadedDoc = null;
let loadingOlder = false;
let noMoreMessages = false;

let lastMarkedAt = 0;
const MARK_READ_DEBOUNCE_MS = 5000;

/* =========================
   MARK CHAT READ
========================= */
async function markChatRead() {
  try {
    // Prefer already-loaded latest messages to avoid an extra read
    let latestTs = null;

    if (latestMessages.length) {
      latestTs = latestMessages[latestMessages.length - 1]?.data?.timestamp || null;
    }

    // Fallback: if listener has not populated yet, query the latest message once
    if (!latestTs) {
      const snap = await db.collection("chatMessages")
        .orderBy("timestamp", "desc")
        .limit(1)
        .get();

      if (!snap.empty) {
        latestTs = snap.docs[0].data().timestamp || null;
      }
    }

    await db.collection("users").doc(userId).set(
      {
        lastChatTime: latestTs || firebase.firestore.FieldValue.serverTimestamp()
      },
      { merge: true }
    );
  } catch (err) {
    console.error("markChatRead error:", err);
  }
}

async function markChatReadDebounced() {
  const now = Date.now();
  if (now - lastMarkedAt < MARK_READ_DEBOUNCE_MS) return;
  lastMarkedAt = now;
  await markChatRead();
}


/* =========================
   NAVIGATION
========================= */
async function goBack() {
  await markChatRead();
  window.location.href = "landing.html";
}

async function logoutUser() {
  await markChatRead();
  localStorage.removeItem(SESSION_KEY);
  window.location.href = "index.html";
}

/* =========================
   HELPERS
========================= */
function formatTime(ts) {
  if (!ts) return "";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString([], {
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

function messageKey(m) {
  return m.id;
}

function dedupeMessages(arr) {
  const seen = new Set();
  const out = [];

  for (const m of arr) {
    const key = messageKey(m);
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(m);
  }

  return out;
}

function getAllMessages() {
  return dedupeMessages([...olderMessages, ...latestMessages]);
}

function updateOldestCursor() {
  const all = getAllMessages();
  oldestLoadedDoc = all.length ? all[0].id : null;
}

function addMessageElement(m, container) {
  const div = document.createElement("div");
  div.className = "message " + (m.data.userId === userId ? "right" : "left");

  div.innerHTML = `
    <div>
      <span class="name">${m.data.username || "User"}</span>
      <span class="time">${formatTime(m.data.timestamp)}</span>
    </div>
    <div class="text">${m.data.text || ""}</div>
  `;

  container.appendChild(div);
}

/* =========================
   RENDER MESSAGES
========================= */
function renderMessages() {
  const atBottomBefore = isAtBottom;
  const prevHeight = box.scrollHeight;
  const prevTop = box.scrollTop;

  box.innerHTML = "";

  const all = getAllMessages();
  all.forEach(m => addMessageElement(m, box));

  updateOldestCursor();

  if (forceScrollToBottom || atBottomBefore) {
    box.scrollTop = box.scrollHeight;
    newMsgBar.style.display = "none";
    forceScrollToBottom = false;
  } else if (loadingOlderFlag) {
    const newHeight = box.scrollHeight;
    const addedHeight = newHeight - prevHeight;
    box.scrollTop = prevTop + addedHeight;
    newMsgBar.style.display = "none";
  } else {
    newMsgBar.style.display = "block";
  }
}

/* =========================
   LIVE LISTENER (latest 15 only)
========================= */
function startListener() {
  if (!cutoffTimestamp) return;

  if (unsubscribe) unsubscribe();

  unsubscribe = db.collection("chatMessages")
    .where("timestamp", ">=", cutoffTimestamp)
    .orderBy("timestamp", "desc")
    .limit(PAGE_SIZE)
    .onSnapshot(snapshot => {
      const live = [];

      snapshot.forEach(doc => {
        live.push({
          id: doc.id,
          data: doc.data()
        });
      });

      // desc -> asc for display
      live.reverse();
      latestMessages = live;

      // remove overlap from paged older bucket
      olderMessages = olderMessages.filter(
        older => !latestMessages.some(latest => latest.id === older.id)
      );

      renderMessages();
    }, err => {
      console.error("chat listener error:", err);
    });
}

/* =========================
   LOAD OLDER (next 15)
========================= */
async function loadOlder() {
  if (!oldestLoadedDoc || loadingOlder || noMoreMessages) return;

  loadingOlder = true;

  try {
    const oldestRef = await db.collection("chatMessages").doc(oldestLoadedDoc).get();

    const snapshot = await db.collection("chatMessages")
      .where("timestamp", ">=", cutoffTimestamp)
      .orderBy("timestamp", "desc")
      .startAfter(oldestRef)
      .limit(PAGE_SIZE)
      .get();

    if (snapshot.empty) {
      noMoreMessages = true;
      loadingOlder = false;
      return;
    }

    const olderBatch = [];
    snapshot.forEach(doc => {
      olderBatch.push({
        id: doc.id,
        data: doc.data()
      });
    });

    // desc -> asc for display
    olderBatch.reverse();

    olderMessages = dedupeMessages([...olderBatch, ...olderMessages]);

    loadingOlderFlag = true;
    renderMessages();
    loadingOlderFlag = false;

  } catch (err) {
    console.error("loadOlder error:", err);
  }

  loadingOlder = false;
}

/* =========================
   SEND MESSAGE
========================= */
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;

  try {
    const userDoc = await db.collection("users").doc(userId).get();
    const username = userDoc.exists ? (userDoc.data().username || "User") : "User";

    const msgRef = db.collection("chatMessages").doc();
    const batch = db.batch();

    batch.set(msgRef, {
      userId,
      username,
      text,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    batch.set(
      db.collection("users").doc(userId),
      {
        lastChatTime: firebase.firestore.FieldValue.serverTimestamp()
      },
      { merge: true }
    );

    batch.set(
      db.collection("__meta").doc("chat"),
      {
        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
      },
      { merge: true }
    );

    await batch.commit();

    msgInput.value = "";

    // force the listener to scroll to bottom when my message lands
    forceScrollToBottom = true;
    isAtBottom = true;
    newMsgBar.style.display = "none";

  } catch (err) {
    console.error("sendMessage error:", err);
  }
}

/* =========================
   INPUT
========================= */
msgInput.addEventListener("keypress", e => {
  if (e.key === "Enter") {
    e.preventDefault();
    sendMessage();
  }
});

/* =========================
   INIT
========================= */
async function init() {
  try {
    const serverNow = await fetchServerTime(db);

    await markChatRead();

    cutoffTimestamp = firebase.firestore.Timestamp.fromMillis(
      serverNow - 3 * 24 * 60 * 60 * 1000
    );

    startListener();
  } catch (err) {
    console.error("chat init error:", err);
  }
}

/* =========================
   SCROLL
========================= */
box.addEventListener("scroll", async () => {
  const nearBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 30;
  isAtBottom = nearBottom;

  if (nearBottom) {
    newMsgBar.style.display = "none";
    await markChatReadDebounced();
  }

  if (box.scrollTop <= 2) {
    loadOlder();
  }
});

newMsgBar.onclick = async () => {
  box.scrollTop = box.scrollHeight;
  newMsgBar.style.display = "none";
  isAtBottom = true;
  await markChatRead();
};

/* =========================
   VISIBILITY / EXIT
========================= */
document.addEventListener("visibilitychange", async () => {
  if (document.hidden) {
    if (unsubscribe) unsubscribe();
    await markChatRead();
  } else {
    startListener();
  }
});

window.addEventListener("beforeunload", () => {
  db.collection("users").doc(userId).set({
    lastChatTime: firebase.firestore.FieldValue.serverTimestamp()
  }, { merge: true });
});

init();
</script>

</body>
</html>
