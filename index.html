<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">	
  <title>WC-2026 Login</title>
  <link rel="stylesheet" href="../WC_common/styles.css">
</head>

<body class="login-page">

<div class="box">
  <h2>World Cup 2026</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <input type="password" id="newPassword" placeholder="New Password" style="display:none;">

  <!-- default mode -->
  <button id="loginBtn" onclick="login()">Login</button>
  <button id="enterCreateModeBtn" onclick="showCreateMode()">Create New User</button>
  <button id="forgotBtn" onclick="showForgotMode()">Forgot My Password</button>

  <!-- create mode -->
  <button id="createBtn" onclick="createUser()" style="display:none;">Create</button>

  <!-- forgot mode -->
  <button id="resetBtn" onclick="resetPassword()" style="display:none;">Reset</button>

  <!-- back -->
  <button id="backBtn" onclick="goBack()" style="display:none;">Back</button>

  <div id="message"></div>
</div>

<!-- Firebase libraries -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="../WC_common/utils.js"></script>
<script>
const SESSION_KEY = "session_" + GAME_ID;

function clearMessage() {
  message.innerText = "";
  message.style.color = "";
}

function setDefaultMode(prefillUsername = "") {
  username.style.display = "";
  password.style.display = "";
  newPassword.style.display = "none";

  loginBtn.style.display = "";
  enterCreateModeBtn.style.display = "";
  forgotBtn.style.display = "";

  createBtn.style.display = "none";
  resetBtn.style.display = "none";
  backBtn.style.display = "none";

  if (prefillUsername) username.value = prefillUsername;

  password.value = "";
  newPassword.value = "";
  clearMessage();
}

function showCreateMode() {
  username.style.display = "";
  password.style.display = "";
  newPassword.style.display = "none";

  loginBtn.style.display = "none";
  enterCreateModeBtn.style.display = "none";
  forgotBtn.style.display = "none";

  createBtn.style.display = "";
  resetBtn.style.display = "none";
  backBtn.style.display = "";

  clearMessage();
}

function showForgotMode() {
  username.style.display = "";
  password.style.display = "none";
  newPassword.style.display = "";

  loginBtn.style.display = "none";
  enterCreateModeBtn.style.display = "none";
  forgotBtn.style.display = "none";

  createBtn.style.display = "none";
  resetBtn.style.display = "";
  backBtn.style.display = "";

  clearMessage();
}

function goBack() {
  const u = username.value;
  setDefaultMode(u);
}

/* =========================
   ✅ LOGIN (UPDATED)
========================= */
function login() {
  const u = username.value.trim();
  const p = password.value;

  if (!u || !p) {
    message.style.color = "red";
    message.innerText = "Enter username and password";
    return;
  }

  db.collection("users")
    .where("username", "==", u)
    .where("password", "==", p)
    .get()
    .then(s => {
      if (!s.empty) {

        const userDoc = s.docs[0];
        const userId = userDoc.id;
        const data = userDoc.data();

        localStorage.setItem(SESSION_KEY, userId);

        const updates = {
          last_login_utc: firebase.firestore.FieldValue.serverTimestamp()
        };

        /* ✅ Ensure lastChatTime exists */

		const defaultChatTime = firebase.firestore.Timestamp.fromDate(
		  new Date("2026-06-11T00:00:00Z")
		);

		if (data.lastChatTime === undefined) {
		  updates.lastChatTime = defaultChatTime;
		}

        return db.collection("users").doc(userId).update(updates)
          .then(() => {
            message.style.color = "green";
            message.innerText = "Login success";
            window.location.href = "rules.html";
          })
          .catch(err => {
            console.error("login update error:", err);
            message.style.color = "red";
            message.innerText = "Login succeeded, but failed to record login time";
          });

      } else {
        message.style.color = "red";
        message.innerText = "Invalid login";
      }
    });
}

/* =========================
   ✅ CREATE USER (UPDATED)
========================= */
function createUser() {
  const u = username.value.trim();
  const p = password.value;

  if (!u || !p) {
    message.style.color = "red";
    message.innerText = "Enter username and password";
    return;
  }

  db.collection("users").where("username", "==", u).get()
    .then(s => {
      if (!s.empty) {
        message.style.color = "red";
        message.innerText = "Username exists";
        return;
      }
	  
	  const defaultChatTime = new Date("2026-06-11T00:00:00Z");


      return db.collection("users").add({
        username: u,
        password: p,
        total_score: null,
        seed: null,
        picks: new Array(73).fill(0),

        /* ✅ NEW FIELDS */
        last_login_utc: null,
        lastChatTime: defaultChatTime

      }).then(() => {
        message.style.color = "green";
        message.innerText = "User created";
        setDefaultMode(u);
      });
    })
    .catch(() => {
      message.style.color = "red";
      message.innerText = "Create user error";
    });
}

/* =========================
   RESET PASSWORD (UNCHANGED)
========================= */
function resetPassword() {
  const u = username.value.trim();
  const np = newPassword.value.trim();

  if (!u) {
    message.style.color = "red";
    message.innerText = "Enter username";
    return;
  }

  if (!np) {
    message.style.color = "red";
    message.innerText = "Enter new password";
    return;
  }

  db.collection("users").where("username", "==", u).get()
    .then(s => {
      if (s.empty) {
        message.style.color = "red";
        message.innerText = "User not found";
        return;
      }

      return db.collection("users").doc(s.docs[0].id).update({
        password: np
      }).then(() => {
        message.style.color = "green";
        message.innerText = "Password reset successful";
        setDefaultMode(u);
      });
    })
    .catch(() => {
      message.style.color = "red";
      message.innerText = "Reset password error";
    });
}

document.addEventListener("DOMContentLoaded", () => {
  setDefaultMode();

  username.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      if (resetBtn.style.display !== "none") {
        newPassword.focus();
      } else {
        password.focus();
      }
    }
  });

  password.addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });

  newPassword.addEventListener("keydown", e => {
    if (e.key === "Enter") resetPassword();
  });
});
</script>


</body>
</html>
