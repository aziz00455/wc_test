<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">	
  <title>WC 2026 - Compare Picks</title>
  <link rel="stylesheet" href="../WC_common/styles.css">
</head>

<body class="game-page">

<div id="topbar"></div>

<div class="controls-sticky">
  <div class="controls-inner">
    <select id="playerSelect"></select>
    <div id="commonCount" class="common-text"></div>
  </div>
</div>

<div class="page-wrap">
  <div id="app"></div>
</div>

<script>
window.global = window;
window.process = window.process || { env: {} };
</script>

<!-- shared -->
<script src="../WC_common/utils.js"></script>
<script src="../WC_common/matches.js"></script>
<script src="../WC_common/teams.js"></script>
<script src="../WC_common/fetchScores.js"></script>
<script src="../WC_common/matchCards.js"></script>

<!-- firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<script>
const SESSION_KEY = "session_" + GAME_ID;
const userId = localStorage.getItem(SESSION_KEY);
if (!userId) window.location.href = "index.html";

/* ✅ URL PARAM (default player) */
const params = new URLSearchParams(window.location.search);
const initialSelectedUser = params.get("uid");

renderTopbar(
  "Compare Picks",
  `
    <button onclick="goBack()">Return</button>
    <button onclick="logout()">Logout</button>
  `
);

function goBack() { window.location.href = "landing.html"; }
function logout() {
  localStorage.removeItem(SESSION_KEY);
  window.location.href = "index.html";
}

/* =========================
   HELPERS
========================= */
function outcome(resultDoc) {
  if (!resultDoc || !["complete","completed"].includes(resultDoc.status)) return null;
  if (resultDoc.score1 > resultDoc.score2) return "team1";
  if (resultDoc.score1 < resultDoc.score2) return "team2";
  return "tie";
}

function shortName(match, choice) {
  const t1 = getTeam(match.team1)?.short || match.team1;
  const t2 = getTeam(match.team2)?.short || match.team2;

  if (choice === "team1") return t1;
  if (choice === "team2") return t2;
  if (choice === "tie") return "Tie";
  return "NP";
}

function styledPick(match, choice, oc) {
  let color = "#222";

  if (oc) {
    if (!choice) color = "red";
    else if (choice === oc) color = "green";
    else color = "red";
  }

  return `<span style="font-weight:700;color:${color};">${shortName(match, choice)}</span>`;
}

/* =========================
   STATE
========================= */
let context = null;
let users = {};
let mySaved = [];
let selectedUserId = null;

/* =========================
   INIT
========================= */
async function init() {
  const { results, serverNow } = await ensureScoresUpToDate();

  const [usersSnap, saved] = await Promise.all([
    db.collection("users").get(),
    loadUserPredictions(db, userId)
  ]);

  mySaved = saved;

  usersSnap.forEach(doc => {
    users[doc.id] = doc.data().username || "User";
  });

  context = {
    results,
    serverNow,
    usersSnap,
    saved
  };

  initDropdown();
}

function initDropdown() {
  const select = document.getElementById("playerSelect");

  const others = Object.keys(users).filter(u => u !== userId);

  select.innerHTML = "";

  others.forEach(id => {
    select.add(new Option(users[id], id));
  });

  selectedUserId =
    initialSelectedUser && users[initialSelectedUser]
      ? initialSelectedUser
      : others[0];

  select.value = selectedUserId;

  select.onchange = () => {
    selectedUserId = select.value;
    render();
  };

  render();
}

/* =========================
   RENDER
========================= */
async function render() {

  window.__scrolledTargetFound = false;  // reset per render

  const otherSaved = await loadUserPredictions(db, selectedUserId);

  let common = 0;
  matches.forEach((m, i) => {
    if (mySaved[i] && mySaved[i] === otherSaved[i]) common++;
  });

  document.getElementById("commonCount").textContent =
    `vs My Picks (Common: ${common} / 72)`;

  const app = document.getElementById("app");
  app.innerHTML = "";

  const grouped = groupMatches(matches);

  for (const date of Object.keys(grouped).sort()) {

    const section = document.createElement("div");
    section.className = "date-section";

    const header = document.createElement("div");
    header.className = "date-heading";
    header.textContent = formatPrettyDate(date);
    section.appendChild(header);

    const list = grouped[date]
      .slice()
      .sort((a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc));

    for (const match of list) {

      const card = await createMatchCardFromDb({
        matchId: match.id,
        userId,
        showActions: false,
        context
      });

      /* ✅ AUTO-SCROLL TARGET (first unlocked match) */
      const locked = isLocked(match, context.serverNow);
      if (!window.__scrolledTargetFound && !locked) {
        card.dataset.scrollTarget = "true";
        window.__scrolledTargetFound = true;
      }

      const idx = getMatchIndex(matches, match.id);

      const pickA = pickIntToChoice(mySaved[idx]);
      const pickB = pickIntToChoice(otherSaved[idx]);
      const oc = outcome(context.results[match.id]);
      const playerName = users[selectedUserId];

      const compareBottom =
        `${playerName}: ${styledPick(match, pickB, oc)} &nbsp; | &nbsp; ` +
        `You: ${styledPick(match, pickA, oc)}`;

      const statusLine = card.querySelector(".status-line");
      if (statusLine) {
        statusLine.innerHTML = compareBottom;
      }

      section.appendChild(card);
    }

    app.appendChild(section);
  }

  /* ✅ AUTO SCROLL */
  if (!window.__hasAutoScrolled) {
    requestAnimationFrame(() => {
      const el = document.querySelector('[data-scroll-target="true"]');
      if (!el) return;

      el.scrollIntoView({ block: "start" });

      window.scrollBy({
        top: -280,
        behavior: "smooth"
      });

      window.__hasAutoScrolled = true;
    });
  }
}

/* =========================
   REFRESH
========================= */
async function refresh() {
  const { results, serverNow } = await ensureScoresUpToDate();
  context.results = results;
  context.serverNow = serverNow;
  render();
}

init();
setInterval(refresh, 5 * 60 * 1000);

</script>

</body>
</html>
