<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>

<div id="topbar"></div>

<div class="page-wrap">
  <div id="featuredMatch" class="featured-match"></div>
  <div id="matchesCompleted" class="matches-completed"></div>

  <div class="table-wrap">
    <table class="landing-table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Name</th>
          <th>Picks</th>
          <th class="score-col">Score</th>
          <th>✅<br><span class="subtext">+1 pt</span></th>
          <th>❌<br><span class="subtext">0 pt</span></th>
          <th>NP<br><span class="subtext">-¼ pt</span></th>
          <th class="last5-col">Last 5</th>
        </tr>
      </thead>
      <tbody id="leaderboardBody"></tbody>
    </table>
  </div>
</div>

<script>
window.global = window;
window.process = window.process || { env: {} };
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<!-- shared -->
<script src="../WC_common/utils.js"></script>
<script src="../WC_common/matches.js"></script>
<script src="../WC_common/teams.js"></script>
<script src="../WC_common/fetchScores.js"></script>
<script src="../WC_common/matchCards.js"></script>

<script>
const SESSION_KEY = "session_" + GAME_ID;
const userId = localStorage.getItem(SESSION_KEY);
if (!userId) window.location.href = "index.html";

function goToR32() { window.location.href = "R32_mapping.html"; }
function goToGame() { window.location.href = "game.html"; }
function goToChat() { window.location.href = "chat.html"; }
function goToStats() { window.location.href = "stats.html"; }
function logout() {
  localStorage.removeItem(SESSION_KEY);
  window.location.href = "index.html";
}

let lastActivityTime = Date.now();
const IDLE_LIMIT_MS = 20 * 60 * 1000; // 20 min

renderTopbar(
  "Leaderboard",
  `
    <button onclick="goToR32()">Knockout Stage</button>
    <button onclick="goToStats()">Stats</button>
    <button id="chatBtn" onclick="goToChat()">Chat</button>
    <button onclick="goToGame()">Pick</button>
    <button onclick="logout()">Logout</button>
  `
);

function updateActivity() {
  lastActivityTime = Date.now();
}

// ✅ activity tracking
["click","mousemove","keydown","scroll"].forEach(evt => {
  document.addEventListener(evt, updateActivity);
});

// ✅ tab visibility (add separately)
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) {
    lastActivityTime = Date.now();
  }
});
/* =========================
   CHAT CHECK
========================= */
async function checkNewChat(userId) {
  const [userDoc, metaDoc] = await Promise.all([
    db.collection("users").doc(userId).get(),
    db.collection("__meta").doc("chat").get()
  ]);

  const lastChatTime = userDoc.data()?.lastChatTime;
  const lastMessageTime = metaDoc.data()?.lastMessageTime;

  if (!lastChatTime || !lastMessageTime) return false;

  return lastMessageTime.toDate() > lastChatTime.toDate();
}

async function updateChatIndicator() {
  try {
    const hasUnread = await checkNewChat(userId);
    const chatBtn = document.getElementById("chatBtn");

    if (!chatBtn) return;

    if (hasUnread) {
      chatBtn.classList.add("blink");
    } else {
      chatBtn.classList.remove("blink");
    }
  } catch (err) {
    console.error("updateChatIndicator error:", err);
  }
}

/* =========================
   FEATURED MATCH
========================= */
let featuredInterval = null;

function renderFeaturedMatch(context) {
  const container = document.getElementById("featuredMatch");

  if (featuredInterval) {
    clearInterval(featuredInterval);
    featuredInterval = null;
  }

  const { results } = context;

  const sorted = matches.slice().sort(
    (a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc)
  );

  const activePool = [];
  const futurePool = [];

  for (const match of sorted) {
    const r = results[match.id];

    const completed = r && (
      r.status === "complete" || r.status === "completed"
    );

    const inPlay = r && r.status === "in_play";

    if (completed || inPlay) {
      activePool.push(match);
    } else {
      futurePool.push(match);
    }
  }

  const recent = activePool.slice(-2);
  const upcoming = futurePool.slice(0, 2);

  const missing = 2 - upcoming.length;
  const backfill = missing > 0
    ? activePool.slice(
        Math.max(0, activePool.length - 2 - missing),
        Math.max(0, activePool.length - 2)
      )
    : [];

  let featuredList = [...backfill, ...recent, ...upcoming];

  const seenSet = new Set();
  featuredList = featuredList.filter(m => {
    if (!m || seenSet.has(m.id)) return false;
    seenSet.add(m.id);
    return true;
  });

  if (!featuredList.length) {
    container.innerHTML = "";
    return;
  }

  let index = 0;

  async function renderCard(match) {
    const card = await createMatchCardFromDb({
      matchId: match.id,
      userId,
      showActions: false,
      context
    });

    container.innerHTML = "";
    card.classList.add("fade");
    container.appendChild(card);
  }

  renderCard(featuredList[index]);

  if (featuredList.length < 2) return;

  featuredInterval = setInterval(() => {
    index = (index + 1) % featuredList.length;
    renderCard(featuredList[index]);
  }, 6000);
}

/* =========================
   LAST 5 HELPER
========================= */
function buildLast5(picksArr, last5Matches, results) {
  let html = "";

  last5Matches.forEach(match => {
    const idx = getMatchIndex(matches, match.id);
    const pick = picksArr[idx];
    const r = results[match.id];

    if (!r) return;

    const outcome =
      r.score1 > r.score2 ? 1 :
      r.score1 < r.score2 ? 2 : 3;

    if (!pick) {
      html += `<span class="n-icon">N</span>`;
    } else if (pick === outcome) {
      html += `<span class="last5-mark">✅</span>`;
    } else {
      html += `<span class="last5-mark">❌</span>`;
    }
  });

  return html;
}

/* =========================
   LEADERBOARD
========================= */
function render(rows) {
  const tbody = document.getElementById("leaderboardBody");
  if (!tbody) return;
  tbody.innerHTML = "";

  let rank = 0;
  let lastScore = null;

  rows.forEach((r, i) => {
    if (r.score !== lastScore) {
      rank = i + 1;
      lastScore = r.score;
    }

    const tr = document.createElement("tr");

    if (r.uid === userId) tr.classList.add("my-row");

    const nameLink = r.uid === userId
      ? `<a href="game.html">${r.name}</a>`
      : `<a href="showpick.html?uid=${r.uid}&name=${encodeURIComponent(r.name)}">${r.name}</a>`;

    tr.innerHTML = `
      <td>${rank}</td>
      <td>${nameLink}</td>
      <td>${r.picks}</td>
      <td class="score-col">${r.score}</td>
      <td>${r.correct}</td>
      <td>${r.incorrect}</td>
      <td>${r.notPicked}</td>
      <td class="last5-col">${r.last5 || ""}</td>
    `;

    tbody.appendChild(tr);
  });
}

function buildResultsMap(summary) {
  const map = summary.results || {};
  let completed = 0;

  Object.values(map).forEach(d => {
    if (d?.status === "complete" || d?.status === "completed") completed++;
  });

  return { map, completed };
}

function normalizePicksArray(raw) {
  const picks = Array.isArray(raw) ? raw.slice(0, 73) : [];

  while (picks.length < 73) picks.push(0);

  for (let i = 0; i < 73; i++) {
    picks[i] = Number(picks[i]) || 0;
  }

  return picks;
}

async function reconcileUserPickCounts(usersSnap) {
  const users = [];
  const updates = [];

  usersSnap.forEach(doc => {
    const data = doc.data() || {};
    const picks = normalizePicksArray(data.picks);

    const realPickCount = picks.slice(0, 72).reduce((sum, val) => {
      return sum + (val ? 1 : 0);
    }, 0);

    if (picks[72] !== realPickCount) {
      picks[72] = realPickCount;

      updates.push(
        db.collection("users").doc(doc.id).update({ picks }).catch(err => {
          console.error(`Failed to reconcile picks[72] for user ${doc.id}:`, err);
        })
      );
    }

    users.push({
      id: doc.id,
      data: {
        ...data,
        picks
      }
    });
  });

  if (updates.length) {
    await Promise.all(updates);
  }

  return users;
}


function buildStats(users, resultsMap) {
  const stats = {};

  users.forEach(user => {
    const picks = user.data.picks || new Array(73).fill(0);

    stats[user.id] = {
      picks: picks[72] || 0,
      correct: 0,
      incorrect: 0,
      completed: 0,
      score: 0
    };

    for (let i = 0; i < 72; i++) {
      if (!picks[i]) continue;

      const result = resultsMap[matches[i].id];
      if (!result || (result.status !== "complete" && result.status !== "completed")) continue;

      stats[user.id].completed++;

      const predicted = picks[i] === 1 ? "team1"
                      : picks[i] === 2 ? "team2"
                      : "tie";

      const outcome = result.score1 > result.score2 ? "team1"
                    : result.score1 < result.score2 ? "team2"
                    : "tie";

      if (predicted === outcome) {
        stats[user.id].correct++;
        stats[user.id].score++;
      } else {
        stats[user.id].incorrect++;
      }
    }
  });

  return stats;
}


/* =========================
   LOAD
========================= */
let usersSnap = null;
let saved = null;

async function loadInitial() {
  await updateChatIndicator();

  const { results, serverNow } = await ensureScoresUpToDate();

  usersSnap = await db.collection("users").get();
  saved = await loadUserPredictions(db, userId);

  await renderPage(results, serverNow);
}

async function refreshScores() {
  const [{ results, serverNow }, freshUsersSnap] = await Promise.all([
    getResultsWithServerTime(),
    db.collection("users").get()
  ]);

  usersSnap = freshUsersSnap;
  await renderPage(results, serverNow);
}

async function renderPage(results, serverNow) {
  const context = { results, serverNow, usersSnap, saved };

  renderFeaturedMatch(context);

  const users = await reconcileUserPickCounts(usersSnap);

  const { map, completed } = buildResultsMap({ results });
  const stats = buildStats(users, map);

  const last5Matches = matches
    .filter(m => {
      const r = results[m.id];
      return r && (r.status === "complete" || r.status === "completed");
    })
    .sort((a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc))
    .slice(-5);

  document.getElementById("matchesCompleted").textContent =
    `Matches Completed: ${completed} / 72`;

  const rows = [];

  users.forEach(user => {
    const s = stats[user.id];
    const notPicked = completed - s.completed;
    const picksArr = user.data.picks || new Array(73).fill(0);

    rows.push({
      uid: user.id,
      name: user.data.username,
      picks: s.picks,
      correct: s.correct,
      incorrect: s.incorrect,
      notPicked,
      score: Number((s.score + notPicked * -0.25).toFixed(2)),
      last5: buildLast5(picksArr, last5Matches, results)
    });
  });

  rows.sort((a, b) => b.score - a.score);
  render(rows);
}

loadInitial();
setInterval(refreshScores, 10 * 60 * 1000);

// ✅ IDLE TIMEOUT CHECK (ADD THIS HERE)
setInterval(() => {
  const now = Date.now();

  if (now - lastActivityTime > IDLE_LIMIT_MS) {
    console.log("Idle timeout → logout");

    localStorage.removeItem(SESSION_KEY);
    window.location.href = "index.html";
  }
}, 60 * 1000); // check every 1 minute
</script>
