<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">	
  <title>WC 2026 - Leaderboard</title>
  <link rel="stylesheet" href="../WC_common/styles.css">
</head>

<body>

<div id="topbar"></div>

<div class="page-wrap">

  <div id="featuredMatch" class="featured-match"></div>

  <div id="matchesCompleted" class="matches-completed"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Rank</th>
          <th>Name</th>
          <th>Picks</th>
          <th class="score-col">Score</th>
          <th>✅<br><span class="subtext">(+1 pt)</span></th>
          <th>❌<br><span class="subtext">(+0 pt)</span></th>
          <th>NP<br><span class="subtext">(-¼ pt)</span></th>
        </tr>
      </thead>
      <tbody id="leaderboardBody"></tbody>
    </table>
  </div>

</div>

<script>
window.global = window;
window.process = window.process || { env: {} };
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<!-- shared -->
<script src="../WC_common/utils.js"></script>
<script src="../WC_common/matches.js"></script>
<script src="../WC_common/teams.js"></script>
<script src="../WC_common/fetchScores.js"></script>
<script src="../WC_common/matchCards.js"></script>

<script>
const SESSION_KEY = "session_" + GAME_ID;
const userId = localStorage.getItem(SESSION_KEY);
if (!userId) window.location.href = "index.html";

function goToGame() { window.location.href = "game.html"; }
function goToChat() { window.location.href = "chat.html"; }
function goToStats() { window.location.href = "stats.html"; }
function logout() {
  localStorage.removeItem(SESSION_KEY);
  window.location.href = "index.html";
}

renderTopbar(
  "Leaderboard **Test",
  `
    <button onclick="goToStats()">Stats</button>
    <button id="chatBtn" onclick="goToChat()">Chat</button>
    <button onclick="goToGame()">Pick</button>
    <button onclick="logout()">Logout</button>
  `
);

/* =========================
   ✅ NEW CHAT CHECK (SIMPLIFIED)
========================= */
async function checkNewChat(userId) {
  const [userDoc, metaDoc] = await Promise.all([
    db.collection("users").doc(userId).get(),
    db.collection("__meta").doc("chat").get()
  ]);

  const lastChatTime = userDoc.data()?.lastChatTime;
  const lastMessageTime = metaDoc.data()?.lastMessageTime;

  if (!lastChatTime || !lastMessageTime) return false;

  const seen = lastChatTime.toDate().getTime();
  const latest = lastMessageTime.toDate().getTime();

  return latest > seen;
}

/* =========================
   FEATURED MATCH
========================= */
function renderFeaturedMatch(context) {
  const container = document.getElementById("featuredMatch");
  const { results, serverNow } = context;

  const sorted = matches.slice().sort((a, b) =>
    new Date(a.kickoffUtc) - new Date(b.kickoffUtc)
  );

  let lastMatch = null;
  let nextMatch = null;

  for (const match of sorted) {
    const resultDoc = results[match.id];

    const completed = resultDoc && (
      resultDoc.status === "complete" || resultDoc.status === "completed"
    );

    if (isStarted(match, serverNow) || completed) {
      lastMatch = match;
    } else if (!nextMatch) {
      nextMatch = match;
    }
  }

  const list = [lastMatch, nextMatch].filter(Boolean);
  if (!list.length) return;

  let index = 0;

  async function renderCard(match) {
    const card = await createMatchCardFromDb({
      matchId: match.id,
      userId,
      showActions: false,
      context
    });

    container.innerHTML = "";
    card.classList.add("fade");
    container.appendChild(card);
  }

  renderCard(list[index]);

  if (list.length < 2) return;

  setInterval(() => {
    index = (index + 1) % list.length;
    renderCard(list[index]);
  }, 4000);
}

/* =========================
   LEADERBOARD LOGIC
========================= */
function buildResultsMap(summary) {
  const map = summary.results || {};
  let completed = 0;

  Object.values(map).forEach(d => {
    if (d?.status === "complete" || d?.status === "completed") completed++;
  });

  return { map, completed };
}

function buildStats(usersSnap, resultsMap) {
  const stats = {};

  usersSnap.forEach(doc => {
    const data = doc.data();
    const picks = data.picks || new Array(73).fill(0);

    stats[doc.id] = {
      picks: picks[72] || 0,
      correct: 0,
      incorrect: 0,
      completed: 0,
      score: 0
    };

    for (let i = 0; i < 72; i++) {
      if (!picks[i]) continue;

      const result = resultsMap[matches[i].id];
      if (!result || result.status !== "complete") continue;

      stats[doc.id].completed++;

      const predicted = picks[i] === 1 ? "team1" :
                        picks[i] === 2 ? "team2" : "tie";

      let outcome;
      if (result.score1 > result.score2) outcome = "team1";
      else if (result.score1 < result.score2) outcome = "team2";
      else outcome = "tie";

      if (predicted === outcome) {
        stats[doc.id].correct++;
        stats[doc.id].score++;
      } else {
        stats[doc.id].incorrect++;
      }
    }
  });

  return stats;
}

function render(rows) {
  const tbody = document.getElementById("leaderboardBody");
  tbody.innerHTML = "";

  let rank = 0;
  let lastScore = null;

  rows.forEach((r, i) => {
    if (r.score !== lastScore) {
      rank = i + 1;
      lastScore = r.score;
    }

    const tr = document.createElement("tr");

    if (r.uid === userId) tr.classList.add("my-row");

    const nameLink = r.uid === userId
      ? `<a href="game.html">${r.name}</a>`
      : `<a href="showpick.html?uid=${r.uid}&name=${encodeURIComponent(r.name)}">${r.name}</a>`;

    tr.innerHTML = `
      <td>${rank}</td>
      <td>${nameLink}</td>
      <td>${r.picks}</td>
      <td class="score-col">${r.score}</td>
      <td>${r.correct}</td>
      <td>${r.incorrect}</td>
      <td>${r.notPicked}</td>
    `;

    tbody.appendChild(tr);
  });
}

/* =========================
   LOAD
========================= */

let usersSnap = null;
let saved = null;

async function loadInitial() {

  /* ✅ NEW CHAT CHECK */
  const hasNewChat = await checkNewChat(userId);
  if (hasNewChat) {
    const chatBtn = document.getElementById("chatBtn");
    if (chatBtn) chatBtn.classList.add("blink");
  }

  const { results, serverNow } = await getResultsWithServerTime();

  usersSnap = await db.collection("users").get();
  saved = await loadUserPredictions(db, userId);

  renderPage(results, serverNow);
}

async function refreshScores() {
  const { results, serverNow } = await getResultsWithServerTime();
  renderPage(results, serverNow);
}

function renderPage(results, serverNow) {
  const context = { results, serverNow, usersSnap, saved };

  renderFeaturedMatch(context);

  const { map, completed } = buildResultsMap({ results });
  const stats = buildStats(usersSnap, map);

  document.getElementById("matchesCompleted").textContent =
    `Matches Completed: ${completed} / 72`;

  const rows = [];

  usersSnap.forEach(doc => {
    const s = stats[doc.id];
    const notPicked = completed - s.completed;
    const finalScore = s.score + (notPicked * -0.25);

    rows.push({
      uid: doc.id,
      name: doc.data().username,
      picks: s.picks,
      correct: s.correct,
      incorrect: s.incorrect,
      notPicked,
      score: Number(finalScore.toFixed(2))
    });
  });

  rows.sort((a, b) => b.score - a.score);
  render(rows);
}

loadInitial();
setInterval(refreshScores, 5 * 60 * 1000);
</script>

</body>
</html>
``
