<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WC 2026 Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 1400px;
      height: 680px;
      overflow: hidden;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
      color: #222;
    }
    body { display: flex; align-items: stretch; justify-content: stretch; }
    .dashboard {
      width: 1400px;
      height: 680px;
      padding: 6px;
      background: #f4f4f4;
      overflow: hidden;
    }
    .table-card {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      overflow: hidden;
    }
    table {
      width: 100%;
      height: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      background: #fff;
    }
    thead th {
      background: #fafafa;
      border-bottom: 1px solid #d9d9d9;
      border-right: 1px solid #eee;
      font-size: 8px;
      font-weight: 700;
      line-height: 1;
      padding: 1px;
      text-align: center;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      vertical-align: middle;
    }
    tbody td {
      border-bottom: 1px solid #eee;
      border-right: 1px solid #f0f0f0;
      font-size: 9px;
      line-height: 1;
      padding: 0 1px;
      text-align: center;
      vertical-align: middle;
      color: #222;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    tbody tr:last-child td { border-bottom: none; }
    thead th:last-child, tbody td:last-child { border-right: none; }
    .rank-col { width: 28px; font-weight: 700; }
    .seed-col { width: 32px; font-weight: 700; }
    .name-col { width: 57px; text-align: left; padding-left: 4px; }
    .team-col { width: 78px; font-weight: 700; }
    .match-col { width: 15px; min-width: 15px; max-width: 15px; padding: 0; }
    .score-col { width: 34px; font-weight: 700; }
    .header-match-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      line-height: 1;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .header-match-id { font-size: 7px; font-weight: 700; line-height: 1; height: 7px; }
    .header-match-flags {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      line-height: 1;
    }
    .header-team-flag { width: 11px; height: 8px; object-fit: cover; border-radius: 1px; display: block; }
    .mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 12px;
      height: 12px;
      font-size: 10px;
      line-height: 1;
      vertical-align: middle;
    }
    .mark-correct { color: #2ecc71; }
    .mark-wrong { color: #c62828; }
    .n-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 11px;
      height: 11px;
      font-size: 8px;
      font-weight: 700;
      line-height: 1;
      background: #111;
      color: #fff;
      border-radius: 2px;
      vertical-align: middle;
    }
    .team-display {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      max-width: 100%;
      overflow: hidden;
      white-space: nowrap;
      line-height: 1;
      vertical-align: middle;
    }
    .team-flag { width: 14px; height: 10px; object-fit: cover; border-radius: 1px; flex: 0 0 auto; }
    .team-short { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-row td { background: #fafafa; font-weight: 700; border-top: 2px solid #d9d9d9; }
    .result-label { text-align: left; padding-left: 4px; }
    .result-flag { width: 12px; height: 9px; object-fit: cover; border-radius: 1px; vertical-align: middle; }
    .result-tie { font-size: 7px; font-weight: 700; line-height: 1; }
    .empty-state {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #ccc;
      border-radius: 8px;
      background: #fafafa;
      color: #666;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="table-card">
      <table id="standingsTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    window.global = window;
    window.process = window.process || { env: {} };
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="../WC_common/utils.js"></script>
  <script src="../WC_common/matches.js"></script>
  <script src="../WC_common/teams.js"></script>
  <script src="../WC_common/fetchScores.js"></script>
  <script src="../WC_common/matchCards.js"></script>

  <script>
    const GROUP_MATCH_COUNT = 72;
    const R32_MAPPING_COLLECTION = "R32mapping";
    const R32_MAPPING_DOC_ID = "main";
    const MATCH_RESULTS_COLLECTION = "matchResults";
    const MATCH_RESULTS_DOC_ID = "main";

    function getDbInstance() {
      try {
        if (window.db) return window.db;
        if (window.firebase && firebase.apps && firebase.apps.length) return firebase.firestore();
      } catch (err) {
        console.error("Failed to create Firestore instance:", err);
      }
      return null;
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    function normalizeKey(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9가-힣]/g, "");
    }

    function firstNonEmpty() {
      for (let i = 0; i < arguments.length; i++) {
        const value = arguments[i];
        if (value == null) continue;
        if (String(value).trim() !== "") return value;
      }
      return null;
    }

    function getAllMatches() {
      if (Array.isArray(window.matches)) return window.matches;
      if (typeof matches !== "undefined" && Array.isArray(matches)) return matches;
      return [];
    }

    function getMatchId(match) {
      return String(match && (match.id != null ? match.id : match.matchNumber != null ? match.matchNumber : match.matchNo != null ? match.matchNo : ""));
    }

    function getGroupMatches() {
      return getAllMatches()
        .slice(0, GROUP_MATCH_COUNT)
        .slice()
        .sort(function (a, b) {
          const at = new Date(a.kickoffUtc || a.date || 0).getTime();
          const bt = new Date(b.kickoffUtc || b.date || 0).getTime();
          if (Number.isFinite(at) && Number.isFinite(bt) && at !== bt) return at - bt;
          return String(getMatchId(a)).localeCompare(String(getMatchId(b)), undefined, { numeric: true });
        });
    }

    function getMatchPickIndex(match) {
      const allMatches = getAllMatches();
      const id = getMatchId(match);

      if (typeof getMatchIndex === "function") {
        const idx = getMatchIndex(allMatches, id);
        if (Number.isFinite(Number(idx)) && Number(idx) >= 0 && Number(idx) < GROUP_MATCH_COUNT) return Number(idx);
      }

      const foundIndex = allMatches.findIndex(function (m) {
        return getMatchId(m) === id;
      });

      return foundIndex >= 0 && foundIndex < GROUP_MATCH_COUNT ? foundIndex : -1;
    }

    function normalizeStatus(value) {
      const s = String(value || "").trim().toLowerCase();
      if (s === "completed") return "complete";
      if (s === "final") return "complete";
      if (s === "ft") return "complete";
      return s;
    }

    function isCompleteResult(result) {
      return !!(result && normalizeStatus(result.status) === "complete");
    }

    function getResultScore(result, side) {
      if (!result) return null;
      const keys = side === 1
        ? ["score1", "homeScore", "scoreHome", "team1Score"]
        : ["score2", "awayScore", "scoreAway", "team2Score"];

      for (let i = 0; i < keys.length; i++) {
        const value = result[keys[i]];
        if (value == null || value === "") continue;
        const n = Number(value);
        if (Number.isFinite(n)) return n;
      }
      return null;
    }

    function getOutcome(result) {
      const s1 = getResultScore(result, 1);
      const s2 = getResultScore(result, 2);
      if (!Number.isFinite(s1) || !Number.isFinite(s2)) return 0;
      if (s1 > s2) return 1;
      if (s2 > s1) return 2;
      return 3;
    }

    function normalizeResultsFromDoc(data) {
      if (!data || typeof data !== "object") return {};
      if (data.results && typeof data.results === "object") return data.results;
      return {};
    }

    async function loadResultsReadOnly(dbInstance) {
      const snap = await dbInstance.collection(MATCH_RESULTS_COLLECTION).doc(MATCH_RESULTS_DOC_ID).get();
      if (!snap.exists) return { results: {} };
      return { results: normalizeResultsFromDoc(snap.data() || {}) };
    }

    async function loadUsers(dbInstance) {
      const snap = await dbInstance.collection("users").get();
      const users = [];
      snap.forEach(function (doc) {
        users.push({ id: doc.id, data: doc.data() || {} });
      });
      return users;
    }

    async function loadR32Mapping(dbInstance) {
      try {
        const snap = await dbInstance.collection(R32_MAPPING_COLLECTION).doc(R32_MAPPING_DOC_ID).get();
        return snap.exists ? (snap.data() || {}) : {};
      } catch (err) {
        console.warn("Unable to read R32mapping/main", err);
        return {};
      }
    }

    function buildUserTeamLookup(mappingData, users) {
      const lookup = {};
      const usersByKey = {};

      users.forEach(function (user) {
        const username = firstNonEmpty(user.data.username, user.data.name, user.data.displayName, user.data.email, user.id);
        [user.id, username, user.data.username, user.data.name, user.data.displayName, user.data.email].forEach(function (value) {
          const key = normalizeKey(value);
          if (key) usersByKey[key] = user.id;
        });
      });

      Object.entries(mappingData || {}).forEach(function ([teamName, teamData]) {
        if (!teamData || typeof teamData !== "object") return;
        if (String(teamData.placement || "").toUpperCase() === "ELIMINATED") return;

        const playerName = firstNonEmpty(
          teamData.player,
          teamData.playerName,
          teamData.username,
          teamData.userName,
          teamData.owner,
          teamData.ownerName,
          teamData.assignedPlayer,
          teamData.assignedPlayerName,
          teamData.userId,
          teamData.uid
        );

        const userId = usersByKey[normalizeKey(playerName)];
        if (userId) lookup[userId] = teamName;
      });

      return lookup;
    }

    function getDisplayName(user) {
      return String(firstNonEmpty(user.data.username, user.data.name, user.data.displayName, user.data.email, user.id) || "User");
    }

    function getUserSeed(user) {
      return firstNonEmpty(user.data.tieSeed, "");
    }

    function getTeamMeta(teamName) {
      if (!teamName || teamName === "Elim") return null;
      if (window.teams && window.teams[teamName]) return window.teams[teamName];
      try {
        if (typeof getTeam === "function") return getTeam(teamName);
      } catch (err) {}
      return null;
    }

    function getTeamFlagUrl(teamName) {
      const team = getTeamMeta(teamName) || {};
      return firstNonEmpty(team.flag, team.flagUrl, team.flagSrc, "");
    }

    function buildTeamMarkup(teamName) {
      if (!teamName || teamName === "Elim") return "-";

      const team = getTeamMeta(teamName) || {};
      const shortName = firstNonEmpty(team.short, team.code, team.abbr, teamName);
      const flag = firstNonEmpty(team.flag, team.flagUrl, team.flagSrc, "");
      const rank = firstNonEmpty(team.rank, "");
      const rankText = rank !== "" ? " (" + escapeHtml(rank) + ")" : "";

      if (flag) {
        return '<span class="team-display"><img class="team-flag" src="' + escapeAttr(flag) + '" alt=""><span class="team-short">' + escapeHtml(shortName) + rankText + '</span></span>';
      }

      return '<span class="team-display"><span class="team-short">' + escapeHtml(shortName) + rankText + '</span></span>';
    }

    function buildMatchHeaderCell(match) {
      const matchId = getMatchId(match);
      const flag1 = getTeamFlagUrl(match.team1);
      const flag2 = getTeamFlagUrl(match.team2);
      let flagsHtml = "";

      if (flag1) flagsHtml += '<img class="header-team-flag" src="' + escapeAttr(flag1) + '" alt="">';
      if (flag2) flagsHtml += '<img class="header-team-flag" src="' + escapeAttr(flag2) + '" alt="">';

      return '<div class="header-match-cell"><div class="header-match-id">' + escapeHtml(matchId) + '</div><div class="header-match-flags">' + flagsHtml + '</div></div>';
    }

    function buildResultCell(match, result) {
      if (!isCompleteResult(result)) return '<span class="n-icon">N</span>';
      const outcome = getOutcome(result);
      if (outcome === 3) return '<span class="result-tie">TIE</span>';
      const winnerTeam = outcome === 1 ? match.team1 : outcome === 2 ? match.team2 : null;
      const flag = getTeamFlagUrl(winnerTeam);
      if (flag) return '<img class="result-flag" src="' + escapeAttr(flag) + '" alt="">';
      return escapeHtml(winnerTeam || '');
    }

    function buildPickMark(pick, result) {
      const numericPick = Number(pick || 0);
      if (!numericPick) return '<span class="n-icon">N</span>';
      if (!isCompleteResult(result)) return '<span class="n-icon">N</span>';
      const outcome = getOutcome(result);
      if (!outcome) return '<span class="n-icon">N</span>';
      if (numericPick === outcome) return '<span class="mark mark-correct">✅</span>';
      return '<span class="mark mark-wrong">❌</span>';
    }

    function calculateUserStats(user, groupMatches, results) {
      const picks = Array.isArray(user.data.picks) ? user.data.picks : [];
      let correct = 0;
      let completedPicked = 0;
      let completedMatches = 0;

      groupMatches.forEach(function (match) {
        const result = results[getMatchId(match)];
        if (!isCompleteResult(result)) return;
        completedMatches += 1;
        const pickIndex = getMatchPickIndex(match);
        const pick = pickIndex >= 0 ? Number(picks[pickIndex] || 0) : 0;
        if (!pick) return;
        completedPicked += 1;
        if (pick === getOutcome(result)) correct += 1;
      });

      const notPicked = completedMatches - completedPicked;
      const score = Number((correct + notPicked * -0.25).toFixed(2));
      return { correct, completedPicked, completedMatches, notPicked, score };
    }

    function applyRanks(rows) {
      const ranked = rows.slice().sort(function (a, b) {
        if (b.score !== a.score) return b.score - a.score;
        return String(a.name).localeCompare(String(b.name));
      });
      let rank = 0;
      let previousScore = null;
      ranked.forEach(function (row, index) {
        if (row.score !== previousScore) {
          rank = index + 1;
          previousScore = row.score;
        }
        row.rank = rank;
      });
    }

    function sortRowsBySeed(rows) {
      rows.sort(function (a, b) {
        const as = Number(a.seed);
        const bs = Number(b.seed);
        const aHasSeed = Number.isFinite(as) && as > 0;
        const bHasSeed = Number.isFinite(bs) && bs > 0;
        if (aHasSeed && bHasSeed && as !== bs) return as - bs;
        if (aHasSeed && !bHasSeed) return -1;
        if (!aHasSeed && bHasSeed) return 1;
        return String(a.name).localeCompare(String(b.name));
      });
    }

    function renderTable(groupMatches, rows, results) {
      const thead = document.getElementById("tableHead");
      const tbody = document.getElementById("tableBody");

      const headerCells = [
        '<th class="rank-col">Rank</th>',
        '<th class="seed-col">Seed</th>',
        '<th class="name-col">Name</th>',
        '<th class="team-col">Team</th>'
      ];

      groupMatches.forEach(function (match) {
        headerCells.push('<th class="match-col">' + buildMatchHeaderCell(match) + '</th>');
      });
      headerCells.push('<th class="score-col">Score</th>');
      thead.innerHTML = '<tr>' + headerCells.join('') + '</tr>';

      const bodyHtml = rows.map(function (row) {
        const cells = [];
        cells.push('<td class="rank-col">' + escapeHtml(row.rank) + '</td>');
        cells.push('<td class="seed-col">' + escapeHtml(row.seed || '') + '</td>');
        cells.push('<td class="name-col">' + escapeHtml(row.name) + '</td>');
        cells.push('<td class="team-col">' + buildTeamMarkup(row.team) + '</td>');

        groupMatches.forEach(function (match) {
          const pickIndex = getMatchPickIndex(match);
          const pick = pickIndex >= 0 ? Number(row.picks[pickIndex] || 0) : 0;
          const result = results[getMatchId(match)];
          cells.push('<td class="match-col">' + buildPickMark(pick, result) + '</td>');
        });

        cells.push('<td class="score-col">' + escapeHtml(row.score) + '</td>');
        return '<tr>' + cells.join('') + '</tr>';
      }).join('');

      const resultCells = [];
      resultCells.push('<td class="rank-col">&nbsp;</td>');
      resultCells.push('<td class="seed-col">&nbsp;</td>');
      resultCells.push('<td class="name-col result-label">Result</td>');
      resultCells.push('<td class="team-col">&nbsp;</td>');

      groupMatches.forEach(function (match) {
        const result = results[getMatchId(match)];
        resultCells.push('<td class="match-col">' + buildResultCell(match, result) + '</td>');
      });
      resultCells.push('<td class="score-col">&nbsp;</td>');

      tbody.innerHTML = bodyHtml + '<tr class="result-row">' + resultCells.join('') + '</tr>';
      fitRows(rows.length + 1);
    }

    function fitRows(rowCount) {
      const card = document.querySelector('.table-card');
      const thead = document.querySelector('#standingsTable thead');
      const rows = document.querySelectorAll('#standingsTable tbody tr');
      if (!card || !thead || !rows.length || !rowCount) return;
      const available = card.clientHeight - thead.offsetHeight;
      const rowHeight = Math.max(10, Math.floor(available / rowCount));
      rows.forEach(function (tr) { tr.style.height = rowHeight + 'px'; });
    }

    async function load() {
      const dbInstance = getDbInstance();
      if (!dbInstance) {
        document.querySelector('.table-card').innerHTML = '<div class="empty-state">Firestore db is not available.</div>';
        return;
      }

      try {
        const groupMatches = getGroupMatches();
        const [resultsPayload, users, mappingData] = await Promise.all([
          loadResultsReadOnly(dbInstance),
          loadUsers(dbInstance),
          loadR32Mapping(dbInstance)
        ]);
        const userTeamLookup = buildUserTeamLookup(mappingData, users);
        const rows = users.map(function (user) {
          const stats = calculateUserStats(user, groupMatches, resultsPayload.results);
          const seed = getUserSeed(user);
          const team = userTeamLookup[user.id] || "Elim";
          return {
            id: user.id,
            name: getDisplayName(user),
            picks: Array.isArray(user.data.picks) ? user.data.picks : [],
            score: stats.score,
            rank: 0,
            seed,
            team
          };
        });
        applyRanks(rows);
        sortRowsBySeed(rows);
        renderTable(groupMatches, rows, resultsPayload.results);
      } catch (err) {
        console.error("Dashboard load error:", err);
        document.querySelector('.table-card').innerHTML = '<div class="empty-state">Failed to load dashboard.</div>';
      }
    }

    load();
    window.addEventListener('resize', function () {
      const rows = document.querySelectorAll('#standingsTable tbody tr');
      fitRows(rows.length || 1);
    });
  </script>
</body>
</html>
