<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WC 2026 Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
      color: #222;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .dashboard {
      width: 100vw;
      height: 100vh;
      padding: 10px;
      display: grid;
      grid-template-columns: 60% 40%;

  	  grid-template-rows: 42px 1fr;
	  grid-template-areas:
	    "summary summary"
	    "left right";

      gap: 10px;
      background: #f4f4f4;
    }

    .left-pane {
      grid-area: left;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .table-card {
      min-width: 0;
      min-height: 0;
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      height: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      background: #fff;
    }

    thead th {
      background: #fafafa;
      border-bottom: 1px solid #ddd;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.1;
      padding: 7px 4px;
      text-align: center;
      color: #111;
    }

    tbody td {
      border-bottom: 1px solid #eee;
      font-size: 15px;
      line-height: 1.1;
      padding: 0 4px;
      text-align: center;
      vertical-align: middle;
      color: #222;
    }

    tbody tr:last-child td { border-bottom: none; }

    .rank-col { width: 46px; }
    .name-col {
      width: 34%;
      text-align: left;
      padding-left: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .picks-col { width: 56px; }
    .score-col {
      width: 68px;
      background: #fff7cc;
      font-weight: 700;
    }
    .small-col { width: 52px; }
    .last5-col {
      width: 112px;
      white-space: nowrap;
      text-align: center;
    }

    .last5-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      font-size: 11px;
      line-height: 1;
      margin: 0 1px;
      vertical-align: middle;
    }

    .n-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
      margin: 0 1px;
      vertical-align: middle;
      background: #111;
      color: #fff;
      border-radius: 2px;
    }

    .right-pane {
      grid-area: right;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      overflow: hidden;
    }

    .day-column {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .day-title {
      flex: 0 0 auto;
      text-align: left;
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin: 0 0 8px 20px;
      line-height: 4.0;
    }

    .match-list {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(6, minmax(0, 1fr));
      gap: 15px;
      overflow: hidden;
    }

    .match-slot {
      min-height: 0;
    }

    /* Strong dashboard-specific overrides on shared match card output */
    .match-list .match-card {
      width: 94% !important;
      max-width: none !important;
      margin: 0 auto !important;
      padding: 7px 10px !important;
      border-radius: 10px !important;
      box-shadow: none !important;
      background: #fff !important;
      border: 1px solid #cfcfcf !important;
      min-height: 0;
      height: 60%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .match-list .match-card.status-completed {
      background: #f1f1f1 !important;
      border: 2px solid #9d9d9d !important;
    }

    .match-list .match-card.status-live {
      background: #e3f2fd !important;
      border: 2px solid #2196f3 !important;
    }

    .match-list .match-card.status-upcoming {
      background: #ffffff !important;
      border: 1px solid #cfcfcf !important;
    }

    /* neutralize result-state styling from shared css */
    .match-list .match-card.correct,
    .match-list .match-card.incorrect,
    .match-list .match-card.in-play {
      background: inherit !important;
      border-color: inherit !important;
    }

    .match-list .match-top {
      margin-bottom: 5px !important;
      font-size: 14px !important;
      font-weight: 700 !important;
    }

    .match-list .match-top-right {
      font-size: 13px !important;
    }

    .match-list .teams-row {
      margin-bottom: 4px !important;
      padding: 0 2px !important;
      column-gap: 3px !important;
    }

    .match-list .team,
    .match-list .score,
    .match-list .vs {
      font-size: 14px !important;
      font-weight: 700 !important;
    }

    .match-list .flag {
      width: 18px !important;
      height: 13px !important;
    }

    .match-list .actions { display: none !important; }

    .match-list .status-line {
      margin-top: 4px !important;
      font-size: 12px !important;
      line-height: 1.2 !important;
      text-align: center !important;
      min-height: 14px;
    }

    .summary-bar {
      grid-area: summary;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="left-pane">
      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th class="rank-col">Rank</th>
              <th class="name-col">Name</th>
              <th class="picks-col">Picks</th>
              <th class="score-col">Score</th>
              <th class="small-col">✅</th>
              <th class="small-col">❌</th>
              <th class="small-col">NP</th>
              <th class="last5-col">Last 5</th>
            </tr>
          </thead>
          <tbody id="leftTableBody"></tbody>
        </table>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th class="rank-col">Rank</th>
              <th class="name-col">Name</th>
              <th class="picks-col">Picks</th>
              <th class="score-col">Score</th>
              <th class="small-col">✅</th>
              <th class="small-col">❌</th>
              <th class="small-col">NP</th>
              <th class="last5-col">Last 5</th>
            </tr>
          </thead>
          <tbody id="rightTableBody"></tbody>
        </table>
      </div>
    </div>

    <div id="matchesPane" class="right-pane"></div>
    <div id="summaryBar" class="summary-bar"></div>
  </div>

  <script>
    window.global = window;
    window.process = window.process || { env:{} };
  </script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <script src="../WC_common/utils.js"></script>
  <script src="../WC_common/matches.js"></script>
  <script src="../WC_common/teams.js"></script>
  <script src="../WC_common/fetchScores.js"></script>
  <script src="../WC_common/matchCards.js"></script>

  <script>
    const DASHBOARD_REFRESH_MS = 60 * 1000;
    let usersSnap = null;

    function buildLast5(picksArr, last5Matches, results) {
      let html = '';
      last5Matches.forEach(match => {
        const idx = getMatchIndex(matches, match.id);
        const pick = picksArr[idx];
        const r = results[match.id];
        if (!r) return;

        const outcome = r.score1 > r.score2 ? 1 : r.score1 < r.score2 ? 2 : 3;
        if (!pick) html += '<span class="n-icon">N</span>';
        else if (pick === outcome) html += '<span class="last5-mark">✅</span>';
        else html += '<span class="last5-mark">❌</span>';
      });
      return html;
    }

    function buildResultsMap(summary) {
      const map = summary.results || {};
      let completed = 0;
      Object.values(map).forEach(d => {
        if (d?.status === 'complete' || d?.status === 'completed') completed++;
      });
      return { map, completed };
    }

    function buildStats(usersSnap, resultsMap) {
      const stats = {};
      usersSnap.forEach(doc => {
        const picks = doc.data().picks || new Array(73).fill(0);
        stats[doc.id] = {
          picks: picks[72] || 0,
          correct: 0,
          incorrect: 0,
          completed: 0,
          score: 0
        };

        for (let i = 0; i < 72; i++) {
          if (!picks[i]) continue;
          const result = resultsMap[matches[i].id];
          if (!result || result.status !== 'complete') continue;

          stats[doc.id].completed++;
          const predicted = picks[i] === 1 ? 'team1' : picks[i] === 2 ? 'team2' : 'tie';
          const outcome = result.score1 > result.score2 ? 'team1' : result.score1 < result.score2 ? 'team2' : 'tie';
          if (predicted === outcome) {
            stats[doc.id].correct++;
            stats[doc.id].score++;
          } else {
            stats[doc.id].incorrect++;
          }
        }
      });
      return stats;
    }

    function renderTables(rows) {
      const leftBody = document.getElementById('leftTableBody');
      const rightBody = document.getElementById('rightTableBody');
      leftBody.innerHTML = '';
      rightBody.innerHTML = '';

      const leftCount = Math.ceil(rows.length / 2);
      const totalRowsPerTable = leftCount;
      const leftRows = rows.slice(0, leftCount);
      const rightRows = rows.slice(leftCount);

      function addRow(tbody, r, blank = false) {
        const tr = document.createElement('tr');
        if (blank) {
          tr.innerHTML = `
            <td class="rank-col">&nbsp;</td>
            <td class="name-col">&nbsp;</td>
            <td class="picks-col">&nbsp;</td>
            <td class="score-col">&nbsp;</td>
            <td class="small-col">&nbsp;</td>
            <td class="small-col">&nbsp;</td>
            <td class="small-col">&nbsp;</td>
            <td class="last5-col">&nbsp;</td>
          `;
        } else {
          tr.innerHTML = `
            <td class="rank-col">${r.rank}</td>
            <td class="name-col">${r.name}</td>
            <td class="picks-col">${r.picks}</td>
            <td class="score-col">${r.score}</td>
            <td class="small-col">${r.correct}</td>
            <td class="small-col">${r.incorrect}</td>
            <td class="small-col">${r.np}</td>
            <td class="last5-col">${r.last5}</td>
          `;
        }
        tbody.appendChild(tr);
      }

      leftRows.forEach(r => addRow(leftBody, r));
      rightRows.forEach(r => addRow(rightBody, r));

      while (leftBody.children.length < totalRowsPerTable) addRow(leftBody, null, true);
      while (rightBody.children.length < totalRowsPerTable) addRow(rightBody, null, true);

      fitLeaderboardRows(totalRowsPerTable);
    }

    function fitLeaderboardRows(totalRowsPerTable) {
      const cards = document.querySelectorAll('.table-card');
      cards.forEach(card => {
        const thead = card.querySelector('thead');
        const rows = card.querySelectorAll('tbody tr');
        if (!rows.length) return;
        const available = card.clientHeight - thead.offsetHeight;
        const rowH = Math.floor(available / totalRowsPerTable);
        rows.forEach(tr => { tr.style.height = `${Math.max(rowH, 22)}px`; });
      });
    }

    function getYesterdayAndToday(serverNow) {
      const oneDay = 24 * 60 * 60 * 1000;
      return [
        getEasternDateKey(serverNow - oneDay),
        getEasternDateKey(serverNow)
      ];
    }

    function buildPicksText(matchId) {
      const p = getPickPercentages(matchId, matches, usersSnap);
      const match = matches.find(m => m.id === matchId);
      const t1 = getTeam(match.team1)?.short || match.team1;
      const t2 = getTeam(match.team2)?.short || match.team2;
      return `<b>Picks:</b> ${t1} ${p.t1}, Tie ${p.tie}, ${t2} ${p.t2}, NP ${p.np}`;
    }

    async function renderMatches(results, serverNow) {
      const pane = document.getElementById('matchesPane');
      pane.innerHTML = '';

      const grouped = groupMatches(matches);
      const [yesterdayKey, todayKey] = getYesterdayAndToday(serverNow);
      const dayKeys = [yesterdayKey, todayKey];

      for (const dayKey of dayKeys) {
        const dayColumn = document.createElement('div');
        dayColumn.className = 'day-column';

        const title = document.createElement('div');
        title.className = 'day-title';
        title.textContent = formatPrettyDate(dayKey);
        dayColumn.appendChild(title);

        const list = document.createElement('div');
        list.className = 'match-list';

        const dayMatches = (grouped[dayKey] || []).sort((a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc));
        const visibleMatches = dayMatches.slice(0, 6);

        for (let i = 0; i < 6; i++) {
          const slot = document.createElement('div');
          slot.className = 'match-slot';

          const match = visibleMatches[i];
          if (match) {
            const card = await createMatchCardFromDb({
              matchId: match.id,
              userId: null,
              showActions: false,
              context: {
                results,
                serverNow,
                usersSnap,
                saved: []
              }
            });

            // dashboard-specific visual/state behavior
            card.classList.remove('correct', 'incorrect', 'in-play', 'status-completed', 'status-live', 'status-upcoming');
            card.querySelector('.actions')?.remove();

            const resultDoc = results[match.id];
            if (resultDoc?.status === 'complete' || resultDoc?.status === 'completed') {
              card.classList.add('status-completed');
            } else if (resultDoc?.status === 'in_play') {
              card.classList.add('status-live');
            } else {
              card.classList.add('status-upcoming');
            }

            // Always show aggregate picks on dashboard, including upcoming
            const statusLine = card.querySelector('.status-line');
            if (statusLine) {
              statusLine.innerHTML = buildPicksText(match.id);
            }

            slot.appendChild(card);
          }

          list.appendChild(slot);
        }

        dayColumn.appendChild(list);
        pane.appendChild(dayColumn);
      }
    }

    async function load() {
      const [{ results, serverNow }, snap] = await Promise.all([
        getResultsWithServerTime(),
        db.collection('users').get()
      ]);

      usersSnap = snap;

      const { map, completed } = buildResultsMap({ results });
      const stats = buildStats(usersSnap, map);

      const last5Matches = matches
        .filter(m => {
          const r = results[m.id];
          return r && (r.status === 'complete' || r.status === 'completed');
        })
        .sort((a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc))
        .slice(-5);

      document.getElementById('summaryBar').textContent = `Matches Completed: ${completed}/72`;

      const rows = [];
      usersSnap.forEach(doc => {
        const s = stats[doc.id];
        const notPicked = completed - s.completed;
        const picksArr = doc.data().picks || new Array(73).fill(0);

        rows.push({
          name: doc.data().username || 'User',
          picks: s.picks,
          correct: s.correct,
          incorrect: s.incorrect,
          np: notPicked,
          score: Number((s.score + notPicked * -0.25).toFixed(2)),
          last5: buildLast5(picksArr, last5Matches, results)
        });
      });

      rows.sort((a, b) => b.score - a.score);
      let rank = 0;
      let prev = null;
      rows.forEach((r, i) => {
        if (r.score !== prev) { rank = i + 1; prev = r.score; }
        r.rank = rank;
      });

      renderTables(rows);
      await renderMatches(results, serverNow);
    }

    load();
    setInterval(load, DASHBOARD_REFRESH_MS);
    window.addEventListener('resize', () => {
      const totalRowsPerTable = Math.ceil(usersSnap?.size ? usersSnap.size / 2 : 1);
      fitLeaderboardRows(totalRowsPerTable);
    });
  </script>
</body>
</html>
