<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WC 2026 Dashboard</title>

  <style>
    * { box-sizing: border-box; }

    /* ✅ FIX: LOCK TRUE FHD CANVAS */
    html, body {
      margin: 0;
      padding: 0;
      width: 1400px;
      height: 680px;
      overflow: hidden;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
      color: #222;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    /* ✅ REDUCE ACTIVE AREA PADDING */
    .dashboard {
      width: 1400px;
      height: 680px;
      padding: 6px;
      display: grid;
      grid-template-columns: 60% 40%;
      grid-template-rows: 42px 1fr;
      grid-template-areas:
        "summary summary"
        "left right";
      gap: 6px;
      background: #f4f4f4;
    }

    .left-pane {
      grid-area: left;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .table-card {
      min-width: 0;
      min-height: 0;
      background: #fff;
      border: 1px solid #d9d9d9;
      border-radius: 10px;
      overflow: hidden;
    }

    table {
      width: 100%;
      height: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      background: #fff;
    }

    thead th {
      background: #fafafa;
      border-bottom: 1px solid #ddd;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.1;
      padding: 3px 2px;
      text-align: center;
      color: #111;
    }

    tbody td {
      border-bottom: 1px solid #eee;
      font-size: 10px;
      line-height: 1.1;
      padding: 0 2px;
      text-align: center;
      vertical-align: middle;
      color: #222;
    }

    tbody tr:last-child td { border-bottom: none; }

    .rank-col { width: 38px; }
    .name-col {
      width: 34%;
      text-align: left;
      padding-left: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .picks-col { width: 38px; }
    .score-col {
      width: 38px;
      background: #fff7cc;
      font-weight: normal;
    }
    .small-col { width: 24px; }
    .last5-col {
      width: 102px;
      white-space: nowrap;
      text-align: center;
    }

    .nextmatch-col {
      width: 26px;
      white-space: nowrap;
      text-align: center;
    }

    .last5-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      font-size: 11px;
      margin: 0 1px;
    }

    .n-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 13px;
      height: 13px;
      font-size: 11px;
      font-weight: 700;
      background: #111;
      color: #fff;
      border-radius: 2px;
      margin: 0 1.5px;
    }

    .prediction-flag {
      display: inline-block;
      width: 16px;
      height: 12px;
      object-fit: cover;
      vertical-align: middle;
      border-radius: 1px;
    }

    .prediction-text {
      display: inline-block;
      font-weight: 700;
      font-size: 10px;
      line-height: 1;
    }

    .right-pane {
      grid-area: right;
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      overflow: hidden;
    }

    .day-column {
      display: flex;
      flex-direction: column;
    }

    /* ✅ MAJOR FIX: RETURN HEIGHT BACK */
    .day-title {
      text-align: left;
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 6px 20px;
      line-height: 1.6;
    }

    .match-list {
      flex: 1;
      display: grid;
      grid-template-rows: repeat(6, minmax(0, 1fr));
      gap: 0px;
    }

    .match-slot {
      min-height: 0;
    }

    .match-list .match-card {
      width: 96% !important;
      margin: 0 auto !important;
      padding: 8px 8px !important;
      height: 75%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .match-list .match-card.status-completed {
      background: #fff59d !important;
      border: 1px solid #f9a825 !important;
    }

    .match-list .match-card.status-live {
      background: #e3f2fd !important;
      border: 2px solid #2196f3 !important;
    }

    .match-list .match-card.status-upcoming {
      background: #fff !important;
      border: 1px solid #cfcfcf !important;
    }

    .match-list .match-top {
      margin-bottom: 5px !important;
      font-size: 12px !important;
      font-weight: 700 !important;
    }

    .match-list .teams-row {
      margin-bottom: 6px !important;
    }

    .match-list .team,
    .match-list .score,
    .match-list .vs {
      font-size: 10px !important;
      font-weight: 700 !important;
    }

    .match-list .actions { display: none !important; }

    .match-list .status-line {
      margin-top: 4px !important;
      font-size: 10px !important;
      text-align: center !important;
    }

    .summary-bar {
      grid-area: summary;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
    }
		
	.last-update {
	  position: absolute;
	  top: 4px;
	  left: 8px;
	  font-size: 10px;
	  color: #666;
	  font-weight: 500;
	  pointer-events: none;
	}

	
  </style>
</head>

<body>

  <div id="lastUpdate" class="last-update"></div>
  
  <div class="dashboard">

    <div class="left-pane">

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th class="rank-col">Rank</th>
              <th class="name-col">Name</th>
              <th class="picks-col">Picks</th>
              <th class="score-col">Score</th>
              <th class="small-col" style="color:#2ecc71;">✅</th>
              <th class="small-col">❌</th>
              <th class="small-col">NP</th>
              <th class="last5-col">Last 5</th>
              <th class="nextmatch-col" id="nextMatchHeader1">--</th>
              <th class="nextmatch-col" id="nextMatchHeader2">--</th>
            </tr>
          </thead>
          <tbody id="leftTableBody"></tbody>
        </table>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th class="rank-col">Rank</th>
              <th class="name-col">Name</th>
              <th class="picks-col">Picks</th>
              <th class="score-col">Score</th>
              <th class="small-col" style="color:#2ecc71;">✅</th>
              <th class="small-col">❌</th>
              <th class="small-col">NP</th>
              <th class="last5-col">Last 5</th>
              <th class="nextmatch-col" id="nextMatchHeader1B">--</th>
              <th class="nextmatch-col" id="nextMatchHeader2B">--</th>
            </tr>
          </thead>
          <tbody id="rightTableBody"></tbody>
        </table>
      </div>

    </div>

    <div id="matchesPane" class="right-pane"></div>
    <div id="summaryBar" class="summary-bar"></div>

  </div>

  <script>
    window.global = window;
    window.process = window.process || { env:{} };
  </script>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <script src="../WC_common/utils.js"></script>
  <script src="../WC_common/matches.js"></script>
  <script src="../WC_common/teams.js"></script>
  <script src="../WC_common/fetchScores.js"></script>
  <script src="../WC_common/matchCards.js"></script>

  <script>
    const DASHBOARD_REFRESH_MS = 5 * 60 * 1000;
    let usersSnap = null;

    function buildLast5(picksArr, last5Matches, results) {
      let html = '';
      last5Matches.forEach(match => {
        const idx = getMatchIndex(matches, match.id);
        const pick = picksArr[idx];
        const r = results[match.id];
        if (!r) return;

        const outcome = r.score1 > r.score2 ? 1 : r.score1 < r.score2 ? 2 : 3;
        if (!pick) html += '<span class="n-icon">N</span>';
        else if (pick === outcome) html += '<span class="last5-mark" style="color:#2ecc71;">✅</span>';
        else html += '<span class="last5-mark">❌</span>';
      });
      return html;
    }

    function buildResultsMap(summary) {
      const map = summary.results || {};
      let completed = 0;
      Object.values(map).forEach(d => {
        if (d?.status === 'complete' || d?.status === 'completed') completed++;
      });
      return { map, completed };
    }

    function buildStats(usersSnap, resultsMap) {
      const stats = {};
      usersSnap.forEach(doc => {
        const picks = doc.data().picks || new Array(73).fill(0);
        stats[doc.id] = {
          picks: picks[72] || 0,
          correct: 0,
          incorrect: 0,
          completed: 0,
          score: 0
        };

        for (let i = 0; i < 72; i++) {
          if (!picks[i]) continue;
          const result = resultsMap[matches[i].id];
          if (!result || result.status !== 'complete') continue;

          stats[doc.id].completed++;
          const predicted = picks[i] === 1 ? 'team1' : picks[i] === 2 ? 'team2' : 'tie';
          const outcome = result.score1 > result.score2 ? 'team1' : result.score1 < result.score2 ? 'team2' : 'tie';
          if (predicted === outcome) {
            stats[doc.id].correct++;
            stats[doc.id].score++;
          } else {
            stats[doc.id].incorrect++;
          }
        }
      });
      return stats;
    }

    function getNextTwoMatches(results) {
      return matches
        .filter(m => {
          const r = results[m.id];
          return !(r && (r.status === 'complete' || r.status === 'completed'));
        })
        .sort((a, b) => {
          const ra = results[a.id];
          const rb = results[b.id];

          const aInPlay = ra?.status === 'in_play';
          const bInPlay = rb?.status === 'in_play';

          if (aInPlay && !bInPlay) return -1;
          if (!aInPlay && bInPlay) return 1;

          return new Date(a.kickoffUtc) - new Date(b.kickoffUtc);
        })
        .slice(0, 2);
    }

    function updateNextMatchHeaders(nextMatches) {
      const h1 = nextMatches[0]?.id || '--';
      const h2 = nextMatches[1]?.id || '--';

      const ids = ['nextMatchHeader1', 'nextMatchHeader1B'];
      const ids2 = ['nextMatchHeader2', 'nextMatchHeader2B'];

      ids.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = h1;
      });

      ids2.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = h2;
      });
    }

    function getTeamFlagMarkup(teamId) {
      const team = getTeam(teamId) || {};

      const src = team.flag || team.flagUrl || team.flagSrc || '';
      if (src && (src.includes('/') || src.includes('.png') || src.includes('.jpg') || src.includes('.jpeg') || src.includes('.svg') || src.startsWith('http'))) {
        return `<img class="prediction-flag" src="${src}" alt="">`;
      }

      const emoji = team.flagEmoji || team.emoji || '';
      if (emoji) {
        return `<span class="prediction-text">${emoji}</span>`;
      }

      const short = team.short || teamId || '';
      return `<span class="prediction-text">${short}</span>`;
    }

    function buildNextPickCell(picksArr, match) {
      if (!match) return '&nbsp;';

      const idx = getMatchIndex(matches, match.id);
      const pick = picksArr[idx];

      if (!pick) return '<span class="n-icon">N</span>';
      if (pick === 3) return '<span class="prediction-text">TIE</span>';
      if (pick === 1) return getTeamFlagMarkup(match.team1);
      if (pick === 2) return getTeamFlagMarkup(match.team2);

      return '&nbsp;';
    }

    function renderTables(rows) {
      const leftBody = document.getElementById('leftTableBody');
      const rightBody = document.getElementById('rightTableBody');
      leftBody.innerHTML = '';
      rightBody.innerHTML = '';

      const leftCount = Math.ceil(rows.length / 2);
      const totalRowsPerTable = leftCount;
      const leftRows = rows.slice(0, leftCount);
      const rightRows = rows.slice(leftCount);

      function addRow(tbody, r, blank = false) {
        const tr = document.createElement('tr');
        if (blank) {
          tr.innerHTML = `
            <td class="rank-col">&nbsp;</td>
            <td class="name-col">&nbsp;</td>
            <td class="picks-col">&nbsp;</td>
            <td class="score-col">&nbsp;</td>
            <td class="small-col">&nbsp;</td>
            <td class="small-col">&nbsp;</td>
            <td class="small-col">&nbsp;</td>
            <td class="last5-col">&nbsp;</td>
            <td class="nextmatch-col">&nbsp;</td>
            <td class="nextmatch-col">&nbsp;</td>
          `;
        } else {
          tr.innerHTML = `
            <td class="rank-col">${r.rank}</td>
            <td class="name-col">${r.name}</td>
            <td class="picks-col">${r.picks}</td>
            <td class="score-col">${r.score}</td>
            <td class="small-col">${r.correct}</td>
            <td class="small-col">${r.incorrect}</td>
            <td class="small-col">${r.np}</td>
            <td class="last5-col">${r.last5}</td>
            <td class="nextmatch-col">${r.next1}</td>
            <td class="nextmatch-col">${r.next2}</td>
          `;
        }
        tbody.appendChild(tr);
      }

      leftRows.forEach(r => addRow(leftBody, r));
      rightRows.forEach(r => addRow(rightBody, r));

      while (leftBody.children.length < totalRowsPerTable) addRow(leftBody, null, true);
      while (rightBody.children.length < totalRowsPerTable) addRow(rightBody, null, true);

      fitLeaderboardRows(totalRowsPerTable);
    }

    function fitLeaderboardRows(totalRowsPerTable) {
      const cards = document.querySelectorAll('.table-card');
      cards.forEach(card => {
        const thead = card.querySelector('thead');
        const rows = card.querySelectorAll('tbody tr');
        if (!rows.length) return;
        const available = card.clientHeight - thead.offsetHeight;
        const rowH = Math.floor(available / totalRowsPerTable);
        rows.forEach(tr => { tr.style.height = `${Math.max(rowH, 22)}px`; });
      });
    }

    function getYesterdayAndToday(serverNow) {
      const oneDay = 24 * 60 * 60 * 1000;
      return [
        getEasternDateKey(serverNow - oneDay),
        getEasternDateKey(serverNow)
      ];
    }

    function buildPicksText(matchId) {
      const p = getPickPercentages(matchId, matches, usersSnap);
      const match = matches.find(m => m.id === matchId);
      const t1 = getTeam(match.team1)?.short || match.team1;
      const t2 = getTeam(match.team2)?.short || match.team2;
      return `<b>Picks:</b> ${t1} ${p.t1}, Tie ${p.tie}, ${t2} ${p.t2}, NP ${p.np}`;
    }

    async function renderMatches(results, serverNow) {
      const pane = document.getElementById('matchesPane');
      pane.innerHTML = '';

      const grouped = groupMatches(matches);
      const [yesterdayKey, todayKey] = getYesterdayAndToday(serverNow);
      const dayKeys = [yesterdayKey, todayKey];

      for (const dayKey of dayKeys) {
        const dayColumn = document.createElement('div');
        dayColumn.className = 'day-column';

        const title = document.createElement('div');
        title.className = 'day-title';
        title.textContent = formatPrettyDate(dayKey);
        dayColumn.appendChild(title);

        const list = document.createElement('div');
        list.className = 'match-list';

        const dayMatches = (grouped[dayKey] || []).sort((a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc));
        const visibleMatches = dayMatches.slice(0, 6);

        for (let i = 0; i < 6; i++) {
          const slot = document.createElement('div');
          slot.className = 'match-slot';

          const match = visibleMatches[i];
          if (match) {
            const card = await createMatchCardFromDb({
              matchId: match.id,
              userId: null,
              showActions: false,
              context: {
                results,
                serverNow,
                usersSnap,
                saved: []
              }
            });

            const teamEls = card.querySelectorAll('.team');

            teamEls.forEach((el, i) => {
              const teamId = i === 0 ? match.team1 : match.team2;
              const short = getTeam(teamId)?.short || teamId;

              const flag = el.querySelector('.flag');

              el.innerHTML = '';

              if (i === 0) {
                if (flag) el.appendChild(flag);
                el.append(' ' + short);
              } else {
                el.append(short + ' ');
                if (flag) el.appendChild(flag);
              }
            });

            card.classList.remove('correct', 'incorrect', 'in-play', 'status-completed', 'status-live', 'status-upcoming');
            card.querySelector('.actions')?.remove();

            const resultDoc = results[match.id];
            if (resultDoc?.status === 'complete' || resultDoc?.status === 'completed') {
              card.classList.add('status-completed');
            } else if (resultDoc?.status === 'in_play') {
              card.classList.add('status-live');
            } else {
              card.classList.add('status-upcoming');
            }

            const statusLine = card.querySelector('.status-line');
            if (statusLine) {
              statusLine.innerHTML = buildPicksText(match.id);
            }

            slot.appendChild(card);
          }

          list.appendChild(slot);
        }

        dayColumn.appendChild(list);
        pane.appendChild(dayColumn);
      }
    }


	function formatLastUpdate(serverNow) {
	  const d = new Date(serverNow);

	  const mm = String(d.getMonth() + 1).padStart(2, '0');
	  const dd = String(d.getDate()).padStart(2, '0');

	  const hours = d.getHours();
	  const minutes = String(d.getMinutes()).padStart(2, '0');

	  return `Last Update: ${mm}/${dd}, ${hours}:${minutes} EDT`;
	}


    async function load() {	
      const [{ results, serverNow }, snap] = await Promise.all([
        getResultsWithServerTime(),
        db.collection('users').get()
      ]);
	  
	  document.getElementById('lastUpdate').textContent = formatLastUpdate(serverNow);

      usersSnap = snap;

      const { map, completed } = buildResultsMap({ results });
      const stats = buildStats(usersSnap, map);

      const last5Matches = matches
        .filter(m => {
          const r = results[m.id];
          return r && (r.status === 'complete' || r.status === 'completed');
        })
        .sort((a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc))
        .slice(-5);

      const nextMatches = getNextTwoMatches(results);
      updateNextMatchHeaders(nextMatches);

      document.getElementById('summaryBar').textContent = `Matches Completed: ${completed} of 72`;

      const rows = [];
      usersSnap.forEach(doc => {
        const s = stats[doc.id];
        const notPicked = completed - s.completed;
        const picksArr = doc.data().picks || new Array(73).fill(0);

        rows.push({
          name: doc.data().username || 'User',
          picks: s.picks,
          correct: s.correct,
          incorrect: s.incorrect,
          np: notPicked,
          score: Number((s.score + notPicked * -0.25).toFixed(2)),
          last5: buildLast5(picksArr, last5Matches, results),
          next1: buildNextPickCell(picksArr, nextMatches[0]),
          next2: buildNextPickCell(picksArr, nextMatches[1])
        });
      });

      rows.sort((a, b) => b.score - a.score);
      let rank = 0;
      let prev = null;
      rows.forEach((r, i) => {
        if (r.score !== prev) { rank = i + 1; prev = r.score; }
        r.rank = rank;
      });

      renderTables(rows);
      await renderMatches(results, serverNow);
    }

    load();
    setInterval(load, DASHBOARD_REFRESH_MS);
    window.addEventListener('resize', () => {
      const totalRowsPerTable = Math.ceil(usersSnap?.size ? usersSnap.size / 2 : 1);
      fitLeaderboardRows(totalRowsPerTable);
    });
  </script>
</body>
</html>
