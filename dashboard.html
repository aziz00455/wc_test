<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 Tournament Leaderboard</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      color: #222;
      font-family: Arial, sans-serif;
      width: 100%;
      min-height: 100%;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .dashboard-frame {
      width: min(100vw, 177.78vh); /* 16:9 friendly */
      min-height: 100vh;
      box-sizing: border-box;
      padding: 18px 22px 20px 22px;
    }

    h1 {
      margin: 0 0 14px 0;
      text-align: center;
      font-size: 32px;
      line-height: 1.2;
      font-weight: 700;
      color: #111;
    }

    .top-area {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .featured-wrap {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 155px;
    }

    .featured-inner {
      width: 100%;
      max-width: 760px;
    }

    .summary-line {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin: 2px 0 0 0;
    }

    .tables-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    .table-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: white;
    }

    thead th {
      background: #fafafa;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
      font-weight: 700;
      padding: 7px 6px;
      text-align: center;
      line-height: 1.2;
    }

    tbody td {
      border-bottom: 1px solid #eee;
      padding: 6px 6px;
      font-size: 13px;
      text-align: center;
      vertical-align: middle;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    .rank-col { width: 42px; }
    .name-col {
      width: 34%;
      text-align: left;
      padding-left: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .picks-col { width: 52px; }
    .score-col {
      width: 58px;
      background: #fff7cc;
      font-weight: 700;
    }
    .tiny-col { width: 48px; }
    .last5-col {
      width: 100px;
      white-space: nowrap;
      text-align: center;
    }

    .subtext {
      font-size: 10px;
      font-weight: normal;
      color: #666;
    }

    .last5-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      line-height: 1;
      font-size: 12px;
      vertical-align: middle;
      margin: 0 1px;
    }

    .n-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: #111;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
      vertical-align: middle;
      margin: 0 1px;
    }

    .featured-match {
      margin-bottom: 0;
    }

    .featured-match .fade {
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    .featured-match .fade.out {
      opacity: 0;
    }

    @media (max-width: 1100px) {
      .tables-grid {
        grid-template-columns: 1fr;
      }

      .dashboard-frame {
        width: 100%;
      }
    }

    @media (max-width: 800px) {
      h1 {
        font-size: 24px;
      }

      .summary-line {
        font-size: 15px;
      }

      thead th,
      tbody td {
        font-size: 11px;
        padding: 4px 3px;
      }

      .rank-col { width: 32px; }
      .name-col { width: 30%; }
      .picks-col { width: 40px; }
      .score-col { width: 46px; }
      .tiny-col { width: 34px; }
      .last5-col { width: 82px; }

      .last5-mark,
      .n-icon {
        width: 11px;
        height: 11px;
        font-size: 8px;
      }
    }
  </style>
</head>

<body>

<div class="dashboard-frame">
  <h1>World Cup 2026 Tournament Leaderboard</h1>

  <div class="top-area">
    <div class="featured-wrap">
      <div id="featuredMatch" class="featured-match featured-inner"></div>
    </div>
    <div id="matchesCompleted" class="summary-line"></div>
  </div>

  <div class="tables-grid">
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th class="rank-col">Rank</th>
            <th class="name-col">Name</th>
            <th class="picks-col">Picks</th>
            <th class="score-col">Score</th>
            <th class="tiny-col">✅</th>
            <th class="tiny-col">❌</th>
            <th class="tiny-col">NP</th>
            <th class="last5-col">Last 5</th>
          </tr>
        </thead>
        <tbody id="leaderboardBodyLeft"></tbody>
      </table>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th class="rank-col">Rank</th>
            <th class="name-col">Name</th>
            <th class="picks-col">Picks</th>
            <th class="score-col">Score</th>
            <th class="tiny-col">✅</th>
            <th class="tiny-col">❌</th>
            <th class="tiny-col">NP</th>
            <th class="last5-col">Last 5</th>
          </tr>
        </thead>
        <tbody id="leaderboardBodyRight"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
window.global = window;
window.process = window.process || { env: {} };
</script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>

<!-- Shared data / logic -->
<script src="../WC_common/utils.js"></script>
<script src="../WC_common/matches.js"></script>
<script src="../WC_common/teams.js"></script>
<script src="../WC_common/fetchScores.js"></script>
<script src="../WC_common/matchCards.js"></script>

<script>
/* =====================================================
   READ-ONLY DASHBOARD
===================================================== */

const DASHBOARD_REFRESH_MS = 60 * 1000; // read-only refresh
let usersSnap = null;
let featuredInterval = null;

/* -------------------------
   LAST 5 HELPER
------------------------- */
function buildLast5(picksArr, last5Matches, results) {
  let html = "";

  last5Matches.forEach(match => {
    const idx = getMatchIndex(matches, match.id);
    const pick = picksArr[idx];
    const r = results[match.id];
    if (!r) return;

    const outcome =
      r.score1 > r.score2 ? 1 :
      r.score1 < r.score2 ? 2 : 3;

    if (!pick) {
      html += '<span class="n-icon">N</span>';
    } else if (pick === outcome) {
      html += '<span class="last5-mark">✅</span>';
    } else {
      html += '<span class="last5-mark">❌</span>';
    }
  });

  return html;
}

/* -------------------------
   FEATURED PICKS SUMMARY
------------------------- */
function buildFeaturedPicksLine(matchId, usersSnap) {
  let team1 = 0, team2 = 0, tie = 0, np = 0;

  usersSnap.forEach(doc => {
    const picks = doc.data().picks || [];
    const idx = getMatchIndex(matches, matchId);
    const raw = picks[idx];

    if (raw === 1) team1++;
    else if (raw === 2) team2++;
    else if (raw === 3) tie++;
    else np++;
  });

  const match = matches.find(m => m.id === matchId);
  if (!match) return "";

  const t1 = getTeam(match.team1)?.short || match.team1;
  const t2 = getTeam(match.team2)?.short || match.team2;

  return `<b>Picks:</b> ${t1} ${team1}, Tie ${tie}, ${t2} ${team2}, NP ${np}`;
}

/* -------------------------
   FEATURED MATCH ROTATION
------------------------- */
function renderFeaturedMatch(context) {
  const container = document.getElementById("featuredMatch");

  if (featuredInterval) {
    clearInterval(featuredInterval);
    featuredInterval = null;
  }

  const { results, serverNow, usersSnap } = context;

  const sorted = matches.slice().sort(
    (a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc)
  );

  const activePool = [];
  const futurePool = [];

  for (const match of sorted) {
    const r = results[match.id];
    const completed = r && (r.status === "complete" || r.status === "completed");
    const inPlay = r && r.status === "in_play";

    if (completed || inPlay) activePool.push(match);
    else futurePool.push(match);
  }

  const recent = activePool.slice(-2);
  const upcoming = futurePool.slice(0, 2);

  const missing = 2 - upcoming.length;
  const backfill = missing > 0
    ? activePool.slice(Math.max(0, activePool.length - 2 - missing), Math.max(0, activePool.length - 2))
    : [];

  let featuredList = [...backfill, ...recent, ...upcoming];

  const seenSet = new Set();
  featuredList = featuredList.filter(m => {
    if (!m || seenSet.has(m.id)) return false;
    seenSet.add(m.id);
    return true;
  });

  if (!featuredList.length) {
    container.innerHTML = "";
    return;
  }

  let index = 0;

  async function renderCard(match) {
    const card = await createMatchCardFromDb({
      matchId: match.id,
      userId: null,
      showActions: false,
      context
    });

    const locked = isLocked(match, serverNow);
    const statusLine = card.querySelector(".status-line");

    if (statusLine) {
      if (locked) {
        statusLine.innerHTML = buildFeaturedPicksLine(match.id, usersSnap);
      } else {
        statusLine.innerHTML = "";
      }
    }

    container.innerHTML = "";
    card.classList.add("fade");
    container.appendChild(card);
  }

  renderCard(featuredList[index]);

  if (featuredList.length < 2) return;

  featuredInterval = setInterval(() => {
    index = (index + 1) % featuredList.length;
    renderCard(featuredList[index]);
  }, 6000);
}

/* -------------------------
   BUILD RESULTS MAP
------------------------- */
function buildResultsMap(summary) {
  const map = summary.results || {};
  let completed = 0;

  Object.values(map).forEach(d => {
    if (d?.status === "complete" || d?.status === "completed") completed++;
  });

  return { map, completed };
}

/* -------------------------
   BUILD STATS
------------------------- */
function buildStats(usersSnap, resultsMap) {
  const stats = {};

  usersSnap.forEach(doc => {
    const picks = doc.data().picks || new Array(73).fill(0);

    stats[doc.id] = {
      picks: picks[72] || 0,
      correct: 0,
      incorrect: 0,
      completed: 0,
      score: 0
    };

    for (let i = 0; i < 72; i++) {
      if (!picks[i]) continue;

      const result = resultsMap[matches[i].id];
      if (!result || result.status !== "complete") continue;

      stats[doc.id].completed++;

      const predicted = picks[i] === 1 ? "team1"
                        : picks[i] === 2 ? "team2"
                        : "tie";

      const outcome = result.score1 > result.score2 ? "team1"
                     : result.score1 < result.score2 ? "team2"
                     : "tie";

      if (predicted === outcome) {
        stats[doc.id].correct++;
        stats[doc.id].score++;
      } else {
        stats[doc.id].incorrect++;
      }
    }
  });

  return stats;
}

/* -------------------------
   RENDER TWO TABLES
------------------------- */
function renderTwoTables(rows) {
  const leftBody = document.getElementById("leaderboardBodyLeft");
  const rightBody = document.getElementById("leaderboardBodyRight");
  if (!leftBody || !rightBody) return;

  leftBody.innerHTML = "";
  rightBody.innerHTML = "";

  const midpoint = Math.ceil(rows.length / 2);
  const leftRows = rows.slice(0, midpoint);
  const rightRows = rows.slice(midpoint);

  function fillTable(tbody, items) {
    items.forEach(r => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="rank-col">${r.rank}</td>
        <td class="name-col">${r.name}</td>
        <td class="picks-col">${r.picks}</td>
        <td class="score-col">${r.score}</td>
        <td class="tiny-col">${r.correct}</td>
        <td class="tiny-col">${r.incorrect}</td>
        <td class="tiny-col">${r.notPicked}</td>
        <td class="last5-col">${r.last5 || ""}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  fillTable(leftBody, leftRows);
  fillTable(rightBody, rightRows);
}

/* -------------------------
   LOAD + RENDER
------------------------- */
async function loadInitial() {
  const [{ results, serverNow }, userSnapshot] = await Promise.all([
    getResultsWithServerTime(),
    db.collection("users").get()
  ]);

  usersSnap = userSnapshot;
  renderPage(results, serverNow);
}

async function refreshDashboard() {
  const { results, serverNow } = await getResultsWithServerTime();
  renderPage(results, serverNow);
}

function renderPage(results, serverNow) {
  const context = { results, serverNow, usersSnap };

  renderFeaturedMatch(context);

  const { map, completed } = buildResultsMap({ results });
  const stats = buildStats(usersSnap, map);

  const last5Matches = matches
    .filter(m => {
      const r = results[m.id];
      return r && (r.status === "complete" || r.status === "completed");
    })
    .sort((a, b) => new Date(a.kickoffUtc) - new Date(b.kickoffUtc))
    .slice(-5);

  const summary = document.getElementById("matchesCompleted");
  if (summary) {
    summary.textContent = `Matches Completed: ${completed} / 72`;
  }

  const rows = [];

  usersSnap.forEach(doc => {
    const s = stats[doc.id];
    const notPicked = completed - s.completed;
    const picksArr = doc.data().picks || new Array(73).fill(0);

    rows.push({
      uid: doc.id,
      name: doc.data().username || "User",
      picks: s.picks,
      correct: s.correct,
      incorrect: s.incorrect,
      notPicked,
      score: Number((s.score + notPicked * -0.25).toFixed(2)),
      last5: buildLast5(picksArr, last5Matches, results)
    });
  });

  rows.sort((a, b) => b.score - a.score);

  let rank = 0;
  let lastScore = null;
  rows.forEach((r, i) => {
    if (r.score !== lastScore) {
      rank = i + 1;
      lastScore = r.score;
    }
    r.rank = rank;
  });

  renderTwoTables(rows);
}

loadInitial();
setInterval(refreshDashboard, DASHBOARD_REFRESH_MS);
</script>

</body>
</html>
